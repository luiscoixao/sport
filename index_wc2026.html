<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>World Cup 2026 Manager</title>

<meta name="theme-color" content="#0b1220" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
/* === DESIGN IDENTIQUE === */
:root{
  --bg:#07101e;
  --card:rgba(255,255,255,.08);
  --text:#eef4ff;
  --muted:#a8b8d8;
  --accent:#61dafb;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:#07101e;
  color:var(--text);
  font-family:-apple-system,Segoe UI;
  padding:14px;
}
.app{max-width:1100px;margin:auto}

/* HEADER */
.hero{
  position:sticky;
  top:0;
  background:#07101e;
  padding-bottom:10px;
}
h1{margin:0;font-size:32px}

/* TABS */
.tabs{display:flex;gap:8px;margin-top:10px}
.tab{
  padding:10px 14px;
  border-radius:12px;
  background:#1a2545;
  cursor:pointer;
}
.tab.active{background:var(--accent);color:#000}

/* PANELS */
.section{display:none;margin-top:20px}
.section.active{display:block}
.panel{
  background:var(--card);
  border-radius:18px;
  padding:16px;
}

/* GROUPES */
.groupsGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}
.groupCard{
  background:#111a36;
  padding:12px;
  border-radius:14px;
}
.groupTitle{font-weight:800;margin-bottom:8px}

/* MATCHS */
.match{
  padding:10px;
  border-radius:12px;
  background:#111a36;
  margin-bottom:8px;
}
.match small{color:var(--muted)}
</style>
</head>

<body>
<div class="app">

<div class="hero">
  <h1>World Cup 2026</h1>

  <div class="tabs" id="tabs"></div>
</div>

<section id="groups" class="section active"></section>
<section id="calendar" class="section"></section>

</div>

<script>

/* ===== DATA ===== */
const DATA = {
groups:{
A:['Mexico','South Africa','South Korea','Czech Republic'],
B:['Canada','Bosnia','Qatar','Switzerland'],
C:['Brazil','Morocco','Haiti','Scotland'],
D:['USA','Paraguay','Australia','Turkey'],
E:['Germany','Curaçao','Ivory Coast','Ecuador'],
F:['Netherlands','Japan','Sweden','Tunisia'],
G:['Belgium','Egypt','Iran','New Zealand'],
H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],
I:['France','Senegal','Iraq','Norway'],
J:['Argentina','Algeria','Austria','Jordan'],
K:['Portugal','DR Congo','Uzbekistan','Colombia'],
L:['England','Croatia','Ghana','Panama']
},
matches:[]
};

/* ===== CALENDRIER ===== */
function buildMatches(){
let start = new Date("2026-06-11T13:00");
let list=[];
let offset=0;

Object.entries(DATA.groups).forEach(([g,teams])=>{
const p=[
[teams[0],teams[1]],
[teams[2],teams[3]],
[teams[0],teams[2]],
[teams[1],teams[3]],
[teams[0],teams[3]],
[teams[1],teams[2]]
];

p.forEach(pair=>{
let d=new Date(start.getTime()+offset*3600000);
list.push({
stage:"Groupes",
group:g,
home:pair[0],
away:pair[1],
date:d.toISOString()
});
offset+=12;
});
});

/* phases finales */
[
"16e","8e","Quart","Demi","Finale"
].forEach(stage=>{
for(let i=0;i<4;i++){
list.push({
stage,
home:"TBD",
away:"TBD",
date:new Date(start.getTime()+offset*3600000).toISOString()
});
offset+=24;
}
});

return list;
}

DATA.matches=buildMatches();

/* ===== TABS ===== */
const TABS=[
{id:"groups",label:"Groupes"},
{id:"calendar",label:"Calendrier"}
];

function renderTabs(){
const el=document.getElementById("tabs");
el.innerHTML=TABS.map((t,i)=>
`<div class="tab ${i===0?"active":""}" data-id="${t.id}">${t.label}</div>`
).join("");

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab.dataset.id).classList.add("active");
};
});
}

/* ===== GROUPES ===== */
function renderGroups(){
const el=document.getElementById("groups");

el.innerHTML=`
<div class="panel">
<div class="groupsGrid">
${Object.entries(DATA.groups).map(([g,teams])=>`
<div class="groupCard">
<div class="groupTitle">Groupe ${g}</div>
${teams.map(t=>`<div>${t}</div>`).join("")}
</div>
`).join("")}
</div>
</div>`;
}

/* ===== CALENDRIER ===== */
function renderCalendar(){
const el=document.getElementById("calendar");

el.innerHTML=`
<div class="panel">
${DATA.matches.map(m=>`
<div class="match">
<strong>${m.home} - ${m.away}</strong><br>
<small>${m.stage}${m.group?" · Groupe "+m.group:""}</small>
</div>
`).join("")}
</div>`;
}

/* ===== INIT ===== */
renderTabs();
renderGroups();
renderCalendar();

</script>
</body>
</html>
