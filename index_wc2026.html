<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Coupe du Monde 2026</title>
<meta name="theme-color" content="#0b1220" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CM 2026" />

<style>
:root{
  --bg:#07101e;
  --bg2:#0d1730;
  --card:rgba(255,255,255,.08);
  --card2:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.10);
  --text:#eef4ff;
  --muted:#a8b8d8;
  --accent:#61dafb;
  --accent2:#7c4dff;
  --shadow:0 18px 40px rgba(0,0,0,.30);
  --radius:22px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  margin:0;
  padding:0;
  background:radial-gradient(circle at top left,#13254a 0%,#0a1430 35%,#070d18 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
}

body{
  min-height:100vh;
  padding:14px 12px 28px;
}

.app{
  max-width:1200px;
  margin:0 auto;
}

.hero{
  position:sticky;
  top:0;
  z-index:20;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  background:linear-gradient(180deg,rgba(7,16,30,.95),rgba(7,16,30,.80));
  padding:2px 0 12px;
}

.heroCard{
  background:linear-gradient(135deg,rgba(124,77,255,.28),rgba(97,218,251,.18));
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
  padding:18px 16px;
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
}

.heroCard:before,.heroCard:after{
  content:"";
  position:absolute;
  border-radius:999px;
  filter:blur(8px);
  opacity:.7;
}
.heroCard:before{
  width:220px;height:220px;right:-80px;top:-80px;
  background:rgba(97,218,251,.14);
}
.heroCard:after{
  width:180px;height:180px;left:-50px;bottom:-70px;
  background:rgba(124,77,255,.18);
}

.heroTop{
  display:flex;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
  align-items:flex-start;
  position:relative;
  z-index:1;
}

h1{
  margin:0 0 8px;
  font-size:clamp(30px,6vw,54px);
  line-height:.95;
  letter-spacing:-.03em;
}

.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.chip{
  padding:8px 11px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  color:var(--text);
  font-size:12px;
  border:1px solid rgba(255,255,255,.08);
}

.tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:14px 0 4px;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}

.tab{
  white-space:nowrap;
  background:rgba(255,255,255,.07);
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:12px 16px;
  font:inherit;
  font-weight:700;
  cursor:pointer;
  transition:.18s;
}
.tab.active{
  background:linear-gradient(135deg,rgba(97,218,251,.20),rgba(124,77,255,.20));
  color:var(--text);
  border-color:rgba(97,218,251,.35);
}

.section{display:none}
.section.active{display:block}

.panel{
  background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.055));
  border:1px solid rgba(255,255,255,.10);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow);
  margin-top:16px;
}

.panelHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.panel h2,.panel h3{
  margin:0;
  letter-spacing:-.03em;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  font-size:12px;
  color:var(--muted);
}

.groupsGrid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}

.groupCard{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:14px;
}

.groupHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.groupLetter{
  font-size:22px;
  font-weight:800;
}

.teamList{
  display:grid;
  gap:8px;
  margin-top:10px;
}

.teamRow{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);
}

.teamIndex{
  width:24px;height:24px;
  border-radius:999px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.09);
  font-size:12px;
  color:var(--muted);
  font-weight:800;
  flex:0 0 auto;
}

.teamName{font-weight:700}

.calendarStage{margin-top:18px}
.calendarStage:first-child{margin-top:0}

.stageTitle{
  font-size:18px;
  font-weight:800;
  margin:0 0 10px;
  letter-spacing:-.03em;
}

.matchesCompact{
  display:grid;
  gap:8px;
}

.matchCard{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:12px;
}

.matchMeta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:12px;
  margin-bottom:8px;
}

.matchMain{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:10px;
  align-items:center;
}

.team{
  font-weight:800;
  font-size:16px;
  line-height:1.15;
}

.team.home{text-align:right}
.team.away{text-align:left}

.vs{
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:52px;
  padding:8px 10px;
  border-radius:12px;
  background:linear-gradient(135deg,rgba(97,218,251,.15),rgba(124,77,255,.15));
  border:1px solid rgba(255,255,255,.10);
  font-weight:800;
  font-size:13px;
}

.venue{
  margin-top:8px;
  color:var(--muted);
  font-size:12px;
}

.small{font-size:12px;color:var(--muted)}

@media (max-width:1080px){
  .groupsGrid{
    grid-template-columns:1fr;
  }
}

@media (max-width:720px){
  body{padding:12px 10px 24px}
  .heroCard{padding:16px 14px}
  .groupsGrid{grid-template-columns:1fr}
  .matchMain{grid-template-columns:1fr}
  .team.home,.team.away{text-align:center}
  .vs{margin:0 auto}
}
</style>
</head>
<body>
<div class="app">

  <div class="hero">
    <div class="heroCard">
      <div class="heroTop">
        <div>
          <h1>Coupe du Monde 2026</h1>
        </div>
        <div class="chips">
          <span class="chip">48 équipes</span>
          <span class="chip">12 groupes</span>
          <span class="chip">11 juin → 19 juillet 2026</span>
          <span class="chip">Canada · Mexique · États-Unis</span>
        </div>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>
  </div>

  <section class="section active" id="groups"></section>
  <section class="section" id="calendar"></section>

</div>

<script>
const TABS = [
  {id:'groups', label:'Groupes'},
  {id:'calendar', label:'Calendrier'}
];

const DATA = {
  groups: {
    A:['Mexique','Afrique du Sud','Corée du Sud','Tchéquie'],
    B:['Canada','Bosnie-Herzégovine','Qatar','Suisse'],
    C:['Brésil','Maroc','Haïti','Écosse'],
    D:['États-Unis','Paraguay','Australie','Turquie'],
    E:['Allemagne','Curaçao','Côte d’Ivoire','Équateur'],
    F:['Pays-Bas','Japon','Suède','Tunisie'],
    G:['Belgique','Égypte','Iran','Nouvelle-Zélande'],
    H:['Espagne','Cap-Vert','Arabie saoudite','Uruguay'],
    I:['France','Sénégal','Irak','Norvège'],
    J:['Argentine','Algérie','Autriche','Jordanie'],
    K:['Portugal','RD Congo','Ouzbékistan','Colombie'],
    L:['Angleterre','Croatie','Ghana','Panama']
  },
  matches:[]
};

function pad(n){
  return String(n).padStart(2,'0');
}

function localDateTimeString(date){
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function formatDate(value){
  const d = new Date(value);
  return d.toLocaleString('fr-FR',{
    weekday:'short',
    day:'2-digit',
    month:'short',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function suggestVenue(groupLetter, pIndex, groupIndex){
  const venues = [
    'Mexico City','Toronto','Los Angeles','New York / New Jersey','Dallas','Houston',
    'Atlanta','Seattle','Miami','Vancouver','Boston','Philadelphia',
    'Kansas City','Monterrey','Guadalajara','San Francisco Bay Area'
  ];
  return venues[(groupIndex*2+pIndex)%venues.length];
}

function buildGroupMatches(){
  const start = new Date(2026, 5, 11, 13, 0, 0); // local time, pas UTC
  const letters = Object.keys(DATA.groups);
  const matches = [];
  let offsetHours = 0;

  letters.forEach((groupLetter, index)=>{
    const teams = DATA.groups[groupLetter];
    const pairings = [
      [teams[0],teams[1]],[teams[2],teams[3]],
      [teams[0],teams[2]],[teams[1],teams[3]],
      [teams[0],teams[3]],[teams[1],teams[2]]
    ];

    pairings.forEach((pair, pIndex)=>{
      const d = new Date(start.getTime() + offsetHours*3600*1000);
      matches.push({
        id:`GS-${groupLetter}-${pIndex+1}`,
        stage:'Phase de groupes',
        group:groupLetter,
        home:pair[0],
        away:pair[1],
        date:localDateTimeString(d),
        venue:suggestVenue(groupLetter, pIndex, index)
      });
      offsetHours += (pIndex % 2 === 0 ? 6 : 18);
    });

    offsetHours += 8;
  });

  return matches;
}

function buildKnockoutMatches(){
  return [
    {id:'R32-1',stage:'Seizièmes de finale',home:'1A',away:'3H',date:'2026-06-28T15:00',venue:'Dallas'},
    {id:'R32-2',stage:'Seizièmes de finale',home:'1B',away:'3G',date:'2026-06-28T21:00',venue:'Houston'},
    {id:'R32-3',stage:'Seizièmes de finale',home:'1C',away:'3F',date:'2026-06-29T15:00',venue:'Atlanta'},
    {id:'R32-4',stage:'Seizièmes de finale',home:'1D',away:'3E',date:'2026-06-29T21:00',venue:'Seattle'},
    {id:'R32-5',stage:'Seizièmes de finale',home:'1E',away:'3D',date:'2026-06-30T15:00',venue:'Miami'},
    {id:'R32-6',stage:'Seizièmes de finale',home:'1F',away:'3C',date:'2026-06-30T21:00',venue:'Vancouver'},
    {id:'R32-7',stage:'Seizièmes de finale',home:'1G',away:'3B',date:'2026-07-01T15:00',venue:'Boston'},
    {id:'R32-8',stage:'Seizièmes de finale',home:'1H',away:'3A',date:'2026-07-01T21:00',venue:'Philadelphia'},
    {id:'R32-9',stage:'Seizièmes de finale',home:'1I',away:'2L',date:'2026-07-02T15:00',venue:'Kansas City'},
    {id:'R32-10',stage:'Seizièmes de finale',home:'1J',away:'2K',date:'2026-07-02T21:00',venue:'Monterrey'},
    {id:'R32-11',stage:'Seizièmes de finale',home:'1K',away:'2J',date:'2026-07-03T15:00',venue:'Guadalajara'},
    {id:'R32-12',stage:'Seizièmes de finale',home:'1L',away:'2I',date:'2026-07-03T21:00',venue:'San Francisco Bay Area'},
    {id:'R32-13',stage:'Seizièmes de finale',home:'2A',away:'2H',date:'2026-07-04T15:00',venue:'Los Angeles'},
    {id:'R32-14',stage:'Seizièmes de finale',home:'2B',away:'2G',date:'2026-07-04T21:00',venue:'Toronto'},
    {id:'R32-15',stage:'Seizièmes de finale',home:'2C',away:'2F',date:'2026-07-05T15:00',venue:'New York / New Jersey'},
    {id:'R32-16',stage:'Seizièmes de finale',home:'2D',away:'2E',date:'2026-07-05T21:00',venue:'Mexico City'},

    {id:'R16-1',stage:'Huitièmes de finale',home:'Vainqueur R32-1',away:'Vainqueur R32-2',date:'2026-07-07T18:00',venue:'Dallas'},
    {id:'R16-2',stage:'Huitièmes de finale',home:'Vainqueur R32-3',away:'Vainqueur R32-4',date:'2026-07-07T22:00',venue:'Houston'},
    {id:'R16-3',stage:'Huitièmes de finale',home:'Vainqueur R32-5',away:'Vainqueur R32-6',date:'2026-07-08T18:00',venue:'Atlanta'},
    {id:'R16-4',stage:'Huitièmes de finale',home:'Vainqueur R32-7',away:'Vainqueur R32-8',date:'2026-07-08T22:00',venue:'Seattle'},
    {id:'R16-5',stage:'Huitièmes de finale',home:'Vainqueur R32-9',away:'Vainqueur R32-10',date:'2026-07-09T18:00',venue:'Miami'},
    {id:'R16-6',stage:'Huitièmes de finale',home:'Vainqueur R32-11',away:'Vainqueur R32-12',date:'2026-07-09T22:00',venue:'Vancouver'},
    {id:'R16-7',stage:'Huitièmes de finale',home:'Vainqueur R32-13',away:'Vainqueur R32-14',date:'2026-07-10T18:00',venue:'Boston'},
    {id:'R16-8',stage:'Huitièmes de finale',home:'Vainqueur R32-15',away:'Vainqueur R32-16',date:'2026-07-10T22:00',venue:'Philadelphia'},

    {id:'QF-1',stage:'Quarts de finale',home:'Espagne',away:'Allemagne',date:'2026-07-12T18:00',venue:'New York / New Jersey'},
    {id:'QF-2',stage:'Quarts de finale',home:'Argentine',away:'Pays-Bas',date:'2026-07-12T22:00',venue:'Dallas'},
    {id:'QF-3',stage:'Quarts de finale',home:'France',away:'Portugal',date:'2026-07-13T18:00',venue:'Atlanta'},
    {id:'QF-4',stage:'Quarts de finale',home:'Brésil',away:'Angleterre',date:'2026-07-13T22:00',venue:'Los Angeles'},

    {id:'SF-1',stage:'Demi-finales',home:'Espagne',away:'Argentine',date:'2026-07-15T21:00',venue:'Dallas'},
    {id:'SF-2',stage:'Demi-finales',home:'France',away:'Brésil',date:'2026-07-16T21:00',venue:'Atlanta'},

    {id:'TP-1',stage:'Match pour la 3e place',home:'Portugal',away:'Angleterre',date:'2026-07-18T19:00',venue:'Miami'},
    {id:'F-1',stage:'Finale',home:'Espagne',away:'France',date:'2026-07-19T19:00',venue:'New York / New Jersey'}
  ];
}

DATA.matches = [...buildGroupMatches(), ...buildKnockoutMatches()];

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = TABS.map((t,i)=>`
    <button class="tab ${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>
  `).join('');

  tabs.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
      document.getElementById(btn.dataset.tab).classList.add('active');
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

function renderGroups(){
  document.getElementById('groups').innerHTML = `
    <div class="panel">
      <div class="panelHeader">
        <h2>Groupes</h2>
        <span class="badge">A à L</span>
      </div>

      <div class="groupsGrid">
        ${Object.entries(DATA.groups).map(([letter,teams])=>`
          <div class="groupCard">
            <div class="groupHeader">
              <div class="groupLetter">Groupe ${letter}</div>
            </div>

            <div class="teamList">
              ${teams.map((team,index)=>`
                <div class="teamRow">
                  <div class="teamIndex">${index+1}</div>
                  <div class="teamName">${team}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function matchHTML(match){
  return `
    <div class="matchCard">
      <div class="matchMeta">
        <span>${match.group ? 'Groupe ' + match.group : match.stage}</span>
        <span>${formatDate(match.date)}</span>
      </div>

      <div class="matchMain">
        <div class="team home">${match.home}</div>
        <div class="vs">VS</div>
        <div class="team away">${match.away}</div>
      </div>

      <div class="venue">${match.venue}</div>
    </div>
  `;
}

function renderCalendar(){
  const stages = [
    'Phase de groupes',
    'Seizièmes de finale',
    'Huitièmes de finale',
    'Quarts de finale',
    'Demi-finales',
    'Match pour la 3e place',
    'Finale'
  ];

  document.getElementById('calendar').innerHTML = `
    <div class="panel">
      <div class="panelHeader">
        <h2>Calendrier</h2>
        <span class="badge">Complet</span>
      </div>

      ${stages.map(stage=>{
        const matches = DATA.matches.filter(m=>m.stage===stage);
        return `
          <div class="calendarStage">
            <h3 class="stageTitle">${stage}</h3>
            <div class="matchesCompact">
              ${matches.map(matchHTML).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

renderTabs();
renderGroups();
renderCalendar();
</script>
</body>
</html>
