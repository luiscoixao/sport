<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Coupe du Monde 2026</title>
<meta name="theme-color" content="#0b1220" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CM 2026" />
<style>
:root{
  --bg:#07101e;
  --card:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.10);
  --text:#eef4ff;
  --muted:#a8b8d8;
  --accent:#61dafb;
  --accent2:#7c4dff;
  --gold:#ffd166;
  --shadow:0 18px 40px rgba(0,0,0,.28);
  --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  padding:0;
  background:radial-gradient(circle at top left,#13254a 0%,#0a1430 35%,#070d18 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
}
body{min-height:100vh;padding:14px 12px 24px}
.app{max-width:1180px;margin:0 auto}
.hero{
  position:sticky;
  top:0;
  z-index:20;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  background:linear-gradient(180deg,rgba(7,16,30,.95),rgba(7,16,30,.82));
  padding:2px 0 12px;
}
.heroCard{
  background:linear-gradient(135deg,rgba(124,77,255,.28),rgba(97,218,251,.18));
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
  padding:18px 16px;
  box-shadow:var(--shadow);
}
.heroTop{
  display:flex;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
  align-items:flex-start;
}
h1{
  margin:0 0 6px;
  font-size:clamp(30px,6vw,54px);
  line-height:.95;
  letter-spacing:-.03em;
}
.heroSub{
  margin:0;
  color:var(--muted);
  font-size:14px;
}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  padding:8px 11px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  color:var(--text);
  font-size:12px;
  border:1px solid rgba(255,255,255,.08);
}
.tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:14px 0 4px;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  white-space:nowrap;
  background:rgba(255,255,255,.07);
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:12px 16px;
  font:inherit;
  font-weight:700;
  cursor:pointer;
}
.tab.active{
  background:linear-gradient(135deg,rgba(97,218,251,.20),rgba(124,77,255,.20));
  color:var(--text);
  border-color:rgba(97,218,251,.35);
}
.section{display:none}
.section.active{display:block}
.panel{
  background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.055));
  border:1px solid rgba(255,255,255,.10);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow);
  margin-top:16px;
}
.panelHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.panel h2,.panel h3{
  margin:0;
  letter-spacing:-.03em;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  font-size:12px;
  color:var(--muted);
}
.groupsGrid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}
.groupCard{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:14px;
}
.groupHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.groupLetter{
  font-size:22px;
  font-weight:800;
}
.groupTeams{
  display:grid;
  gap:8px;
}
.teamRow{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);
}
.teamIndex{
  width:24px;height:24px;
  border-radius:999px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.09);
  font-size:12px;
  color:var(--muted);
  font-weight:800;
  flex:0 0 auto;
}
.teamName{font-weight:700}
.calendarStage{margin-top:16px}
.calendarStage:first-child{margin-top:0}
.stageTitle{
  font-size:18px;
  font-weight:800;
  margin:0 0 10px;
  letter-spacing:-.03em;
}
.matchesCompact{display:grid;gap:8px}
.matchCard{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:10px 12px;
}
.matchTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:8px;
  font-size:12px;
  color:var(--muted);
}
.matchMain{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:12px;
  align-items:center;
}
.team{
  font-weight:800;
  font-size:15px;
  line-height:1.2;
}
.team.home{text-align:right}
.team.away{text-align:left}
.vs{
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:46px;
  padding:6px 10px;
  border-radius:11px;
  background:linear-gradient(135deg,rgba(97,218,251,.15),rgba(124,77,255,.15));
  border:1px solid rgba(255,255,255,.10);
  font-weight:800;
  font-size:12px;
}
.venue{
  margin-top:8px;
  color:var(--muted);
  font-size:12px;
}
.probaGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.probaCard{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:14px;
}
.probaTop{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-bottom:8px;
}
.rank{
  width:28px;height:28px;border-radius:999px;
  display:grid;place-items:center;
  background:rgba(255,209,102,.18);
  color:#ffe7a6;font-size:12px;font-weight:800;
}
.probaTeam{font-weight:800;font-size:18px}
.probaPct{font-weight:800}
.bar{
  height:10px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
  margin-top:10px;
}
.bar span{
  display:block;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--gold),var(--accent));
}
.note,.small{font-size:12px;color:var(--muted)}
@media (max-width:1080px){
  .groupsGrid,.probaGrid{grid-template-columns:1fr}
}
@media (max-width:720px){
  body{padding:12px 10px 22px}
  .heroCard{padding:16px 14px}
  .groupsGrid,.probaGrid{grid-template-columns:1fr}
  .matchMain{grid-template-columns:1fr}
  .team.home,.team.away{text-align:center}
  .vs{margin:0 auto}
  .matchTop{justify-content:flex-start}
}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="heroCard">
      <div class="heroTop">
        <div>
          <h1>Coupe du Monde 2026</h1>
          <p class="heroSub">Phase de groupes corrigée et projections probables dès les 16es.</p>
        </div>
        <div class="chips">
          <span class="chip">48 équipes</span>
          <span class="chip">12 groupes</span>
          <span class="chip">11 juin → 19 juillet 2026</span>
          <span class="chip">Canada · Mexique · États-Unis</span>
        </div>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>
  </div>

  <section class="section active" id="groups"></section>
  <section class="section" id="calendar"></section>
  <section class="section" id="proba"></section>
</div>

<script>
const TABS = [
  {id:'groups', label:'Groupes'},
  {id:'calendar', label:'Calendrier'},
  {id:'proba', label:'Probabilités'}
];

const DATA = {
  groups: {
    A:['Mexique','Afrique du Sud','Corée du Sud','Tchéquie'],
    B:['Canada','Bosnie-Herzégovine','Qatar','Suisse'],
    C:['Brésil','Maroc','Haïti','Écosse'],
    D:['États-Unis','Paraguay','Australie','Turquie'],
    E:['Allemagne','Curaçao','Côte d’Ivoire','Équateur'],
    F:['Pays-Bas','Japon','Suède','Tunisie'],
    G:['Belgique','Égypte','Iran','Nouvelle-Zélande'],
    H:['Espagne','Cap-Vert','Arabie saoudite','Uruguay'],
    I:['France','Sénégal','Irak','Norvège'],
    J:['Argentine','Algérie','Autriche','Jordanie'],
    K:['Portugal','RD Congo','Ouzbékistan','Colombie'],
    L:['Angleterre','Croatie','Ghana','Panama']
  },
  proba: [
    {team:'Espagne', pct:20},
    {team:'France', pct:18},
    {team:'Angleterre', pct:14},
    {team:'Argentine', pct:13},
    {team:'Brésil', pct:12},
    {team:'Portugal', pct:9},
    {team:'Allemagne', pct:8},
    {team:'Pays-Bas', pct:6}
  ],
  matches:[]
};

function pad(n){ return String(n).padStart(2,'0'); }

function localDateTimeString(date){
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function formatDate(value){
  const d = new Date(value);
  return d.toLocaleString('fr-FR',{
    weekday:'short',
    day:'2-digit',
    month:'short',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function suggestVenue(groupLetter, pIndex, groupIndex){
  const venues = [
    'Mexico City','Toronto','Los Angeles','New York / New Jersey','Dallas','Houston',
    'Atlanta','Seattle','Miami','Vancouver','Boston','Philadelphia',
    'Kansas City','Monterrey','Guadalajara','San Francisco Bay Area'
  ];
  return venues[(groupIndex*2+pIndex)%venues.length];
}

function buildGroupMatches(){
  const matchDates = [
    '2026-06-11T13:00','2026-06-11T19:00',
    '2026-06-12T13:00','2026-06-12T19:00',
    '2026-06-13T13:00','2026-06-13T19:00',
    '2026-06-14T13:00','2026-06-14T19:00',
    '2026-06-15T13:00','2026-06-15T19:00',
    '2026-06-16T13:00','2026-06-16T19:00',
    '2026-06-17T13:00','2026-06-17T19:00',
    '2026-06-18T13:00','2026-06-18T19:00',
    '2026-06-19T13:00','2026-06-19T19:00',
    '2026-06-20T13:00','2026-06-20T19:00',
    '2026-06-21T13:00','2026-06-21T19:00',
    '2026-06-22T13:00','2026-06-22T19:00',
    '2026-06-23T13:00','2026-06-23T19:00',
    '2026-06-24T13:00','2026-06-24T19:00',
    '2026-06-25T13:00','2026-06-25T19:00',
    '2026-06-26T13:00','2026-06-26T19:00',
    '2026-06-27T13:00','2026-06-27T19:00'
  ];

  const letters = Object.keys(DATA.groups);
  const matches = [];
  let dateIndex = 0;

  letters.forEach((groupLetter, index)=>{
    const teams = DATA.groups[groupLetter];
    const pairings = [
      [teams[0],teams[1]],
      [teams[2],teams[3]],
      [teams[0],teams[2]],
      [teams[1],teams[3]],
      [teams[0],teams[3]],
      [teams[1],teams[2]]
    ];

    pairings.forEach((pair, pIndex)=>{
      matches.push({
        id:`GS-${groupLetter}-${pIndex+1}`,
        stage:'Phase de groupes',
        group:groupLetter,
        home:pair[0],
        away:pair[1],
        date:matchDates[dateIndex % matchDates.length],
        venue:suggestVenue(groupLetter, pIndex, index)
      });
      dateIndex++;
    });
  });

  return matches;
}

function buildKnockoutMatches(){
  return [
    {id:'R32-1',stage:'Seizièmes de finale',home:'Espagne',away:'Suisse',date:'2026-06-28T15:00',venue:'Dallas'},
    {id:'R32-2',stage:'Seizièmes de finale',home:'Belgique',away:'Uruguay',date:'2026-06-28T21:00',venue:'Houston'},
    {id:'R32-3',stage:'Seizièmes de finale',home:'Brésil',away:'Tunisie',date:'2026-06-29T15:00',venue:'Atlanta'},
    {id:'R32-4',stage:'Seizièmes de finale',home:'Allemagne',away:'Turquie',date:'2026-06-29T21:00',venue:'Seattle'},
    {id:'R32-5',stage:'Seizièmes de finale',home:'Pays-Bas',away:'Paraguay',date:'2026-06-30T15:00',venue:'Miami'},
    {id:'R32-6',stage:'Seizièmes de finale',home:'Argentine',away:'Norvège',date:'2026-06-30T21:00',venue:'Vancouver'},
    {id:'R32-7',stage:'Seizièmes de finale',home:'France',away:'Croatie',date:'2026-07-01T15:00',venue:'Boston'},
    {id:'R32-8',stage:'Seizièmes de finale',home:'Portugal',away:'Sénégal',date:'2026-07-01T21:00',venue:'Philadelphia'},

    {id:'R32-9',stage:'Seizièmes de finale',home:'Angleterre',away:'Colombie',date:'2026-07-02T15:00',venue:'Kansas City'},
    {id:'R32-10',stage:'Seizièmes de finale',home:'Mexique',away:'Maroc',date:'2026-07-02T21:00',venue:'Monterrey'},
    {id:'R32-11',stage:'Seizièmes de finale',home:'États-Unis',away:'Japon',date:'2026-07-03T15:00',venue:'Guadalajara'},
    {id:'R32-12',stage:'Seizièmes de finale',home:'Uruguay',away:'Canada',date:'2026-07-03T21:00',venue:'San Francisco Bay Area'},
    {id:'R32-13',stage:'Seizièmes de finale',home:'Espagne',away:'Mexique',date:'2026-07-04T15:00',venue:'Los Angeles'},
    {id:'R32-14',stage:'Seizièmes de finale',home:'Allemagne',away:'Belgique',date:'2026-07-04T21:00',venue:'Toronto'},
    {id:'R32-15',stage:'Seizièmes de finale',home:'France',away:'Pays-Bas',date:'2026-07-05T15:00',venue:'New York / New Jersey'},
    {id:'R32-16',stage:'Seizièmes de finale',home:'Brésil',away:'Argentine',date:'2026-07-05T21:00',venue:'Mexico City'},

    {id:'R16-1',stage:'Huitièmes de finale',home:'Espagne',away:'Belgique',date:'2026-07-07T18:00',venue:'Dallas'},
    {id:'R16-2',stage:'Huitièmes de finale',home:'Brésil',away:'Allemagne',date:'2026-07-07T22:00',venue:'Houston'},
    {id:'R16-3',stage:'Huitièmes de finale',home:'Pays-Bas',away:'Argentine',date:'2026-07-08T18:00',venue:'Atlanta'},
    {id:'R16-4',stage:'Huitièmes de finale',home:'France',away:'Portugal',date:'2026-07-08T22:00',venue:'Seattle'},
    {id:'R16-5',stage:'Huitièmes de finale',home:'Angleterre',away:'Mexique',date:'2026-07-09T18:00',venue:'Miami'},
    {id:'R16-6',stage:'Huitièmes de finale',home:'États-Unis',away:'Uruguay',date:'2026-07-09T22:00',venue:'Vancouver'},
    {id:'R16-7',stage:'Huitièmes de finale',home:'Espagne',away:'Allemagne',date:'2026-07-10T18:00',venue:'Boston'},
    {id:'R16-8',stage:'Huitièmes de finale',home:'France',away:'Brésil',date:'2026-07-10T22:00',venue:'Philadelphia'},

    {id:'QF-1',stage:'Quarts de finale',home:'Espagne',away:'Allemagne',date:'2026-07-12T18:00',venue:'New York / New Jersey'},
    {id:'QF-2',stage:'Quarts de finale',home:'Argentine',away:'Pays-Bas',date:'2026-07-12T22:00',venue:'Dallas'},
    {id:'QF-3',stage:'Quarts de finale',home:'France',away:'Portugal',date:'2026-07-13T18:00',venue:'Atlanta'},
    {id:'QF-4',stage:'Quarts de finale',home:'Brésil',away:'Angleterre',date:'2026-07-13T22:00',venue:'Los Angeles'},

    {id:'SF-1',stage:'Demi-finales',home:'Espagne',away:'Argentine',date:'2026-07-15T21:00',venue:'Dallas'},
    {id:'SF-2',stage:'Demi-finales',home:'France',away:'Brésil',date:'2026-07-16T21:00',venue:'Atlanta'},

    {id:'TP-1',stage:'Match pour la 3e place',home:'Argentine',away:'Brésil',date:'2026-07-18T19:00',venue:'Miami'},
    {id:'F-1',stage:'Finale',home:'Espagne',away:'France',date:'2026-07-19T19:00',venue:'New York / New Jersey'}
  ];
}

DATA.matches = [...buildGroupMatches(), ...buildKnockoutMatches()];

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = TABS.map((t,i)=>`
    <button class="tab ${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>
  `).join('');

  tabs.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
      document.getElementById(btn.dataset.tab).classList.add('active');
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

function renderGroups(){
  document.getElementById('groups').innerHTML = `
    <div class="panel">
      <div class="panelHeader">
        <h2>Groupes</h2>
        <span class="badge">A à L</span>
      </div>
      <div class="groupsGrid">
        ${Object.entries(DATA.groups).map(([letter,teams])=>`
          <div class="groupCard">
            <div class="groupHeader">
              <div class="groupLetter">Groupe ${letter}</div>
            </div>
            <div class="groupTeams">
              ${teams.map((team,index)=>`
                <div class="teamRow">
                  <div class="teamIndex">${index+1}</div>
                  <div class="teamName">${team}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function matchHTML(match){
  return `
    <div class="matchCard">
      <div class="matchTop">
        <span>${match.group ? 'Groupe ' + match.group : match.stage}</span>
        <span>${formatDate(match.date)}</span>
      </div>
      <div class="matchMain">
        <div class="team home">${match.home}</div>
        <div class="vs">VS</div>
        <div class="team away">${match.away}</div>
      </div>
      <div class="venue">${match.venue}</div>
    </div>
  `;
}

function renderCalendar(){
  const stages = [
    'Phase de groupes',
    'Seizièmes de finale',
    'Huitièmes de finale',
    'Quarts de finale',
    'Demi-finales',
    'Match pour la 3e place',
    'Finale'
  ];

  document.getElementById('calendar').innerHTML = `
    <div class="panel">
      <div class="panelHeader">
        <h2>Calendrier</h2>
        <span class="badge">${DATA.matches.length} matchs</span>
      </div>

      ${stages.map(stage=>{
        const matches = DATA.matches.filter(m=>m.stage===stage);
        return `
          <div class="calendarStage">
            <h3 class="stageTitle">${stage}</h3>
            <div class="matchesCompact">
              ${matches.map(matchHTML).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderProba(){
  const list = [...DATA.proba].sort((a,b)=>b.pct-a.pct);
  document.getElementById('proba').innerHTML = `
    <div class="panel">
      <div class="panelHeader">
        <h2>Probabilités</h2>
        <span class="badge">Projection</span>
      </div>
      <div class="probaGrid">
        ${list.map((item,index)=>`
          <div class="probaCard">
            <div class="probaTop">
              <div style="display:flex;align-items:center;gap:10px">
                <div class="rank">${index+1}</div>
                <div class="probaTeam">${item.team}</div>
              </div>
              <div class="probaPct">${item.pct}%</div>
            </div>
            <div class="small">Chances estimées de remporter le tournoi</div>
            <div class="bar"><span style="width:${Math.min(item.pct * 4, 100)}%"></span></div>
          </div>
        `).join('')}
      </div>
      <div class="note">Projection simple : Espagne et France devant, puis Angleterre, Argentine, Brésil, Portugal, Allemagne et Pays-Bas.</div>
    </div>
  `;
}

renderTabs();
renderGroups();
renderCalendar();
renderProba();
</script>
</body>
</html>
