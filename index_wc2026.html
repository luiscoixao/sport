<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Coupe du Monde 2026</title>

<meta name="theme-color" content="#0b1220" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
:root{
  --bg:#07101e;
  --card:rgba(255,255,255,.08);
  --text:#eef4ff;
  --muted:#a8b8d8;
  --accent:#61dafb;
  --accent2:#7c4dff;
  --gold:#ffd166;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  font-family:-apple-system;
  background:radial-gradient(circle at top left,#13254a 0%,#0a1430 35%,#070d18 100%);
  color:var(--text);
  padding:14px;
}

.app{max-width:1100px;margin:auto}

/* HEADER */
.hero{
  position:sticky;
  top:0;
  z-index:20;
  background:#07101e;
  padding-bottom:10px;
}

.heroCard{
  background:linear-gradient(135deg,#4e3dff44,#61dafb22);
  border-radius:22px;
  padding:18px;
}

h1{margin:0;font-size:34px}

.subtitle{color:var(--muted);margin:8px 0 14px}

.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  background:#ffffff15;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
}

/* FAVORIS */
.favorites{
  margin-top:18px;
}

.fav{
  background:#ffffff10;
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
}

.favTop{
  display:flex;
  justify-content:space-between;
}

.rank{
  background:#ffd16633;
  border-radius:50%;
  width:28px;height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

.bar{
  height:8px;
  border-radius:999px;
  background:#ffffff15;
  margin-top:8px;
}
.bar span{
  display:block;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#ffd166,#61dafb);
}

/* TABS */
.tabs{display:flex;gap:8px;margin-top:12px}
.tab{
  padding:10px 14px;
  border-radius:12px;
  background:#1a2545;
  cursor:pointer;
}
.tab.active{background:var(--accent);color:#000}

/* PANELS */
.section{display:none;margin-top:20px}
.section.active{display:block}

.panel{
  background:var(--card);
  padding:16px;
  border-radius:18px;
}

/* GROUPES */
.groups{
  display:grid;
  gap:12px;
}

.group{
  background:#ffffff08;
  padding:12px;
  border-radius:14px;
}

/* MATCH */
.match{
  background:#ffffff08;
  padding:10px;
  border-radius:12px;
  margin-bottom:8px;
}

small{color:var(--muted)}
</style>
</head>

<body>
<div class="app">

<div class="hero">
  <div class="heroCard">
    <h1>Coupe du Monde 2026</h1>
    <div class="subtitle">
      Groupes, calendrier complet et favoris
    </div>

    <div class="chips">
      <span class="chip">48 équipes</span>
      <span class="chip">12 groupes</span>
      <span class="chip">11 juin → 19 juillet</span>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
</div>

<!-- FAVORIS (NON STICKY ✅) -->
<div class="favorites" id="favorites"></div>

<section id="groups" class="section active"></section>
<section id="calendar" class="section"></section>

</div>

<script>

/* FAVORIS */
const favorites = [
{team:'Espagne',odd:'5/1'},
{team:'France',odd:'13/2'},
{team:'Angleterre',odd:'13/2'},
{team:'Argentine',odd:'17/2'},
{team:'Brésil',odd:'9/1'}
];

function prob(f){
const [a,b]=f.split('/').map(Number);
return (b/(a+b))*100;
}

document.getElementById("favorites").innerHTML =
favorites.map((f,i)=>`
<div class="fav">
  <div class="favTop">
    <div class="rank">${i+1}</div>
    <div>${f.odd}</div>
  </div>
  <strong>${f.team}</strong>
  <div>Probabilité : ${prob(f.odd).toFixed(1)}%</div>
  <div class="bar"><span style="width:${prob(f.odd)*2}%"></span></div>
</div>
`).join("");

/* GROUPES */
const groups = {
A:['Mexique','Afrique du Sud','Corée du Sud','Tchéquie'],
B:['Canada','Bosnie','Qatar','Suisse'],
C:['Brésil','Maroc','Haïti','Écosse'],
D:['États-Unis','Paraguay','Australie','Turquie'],
E:['Allemagne','Curaçao','Côte d’Ivoire','Équateur'],
F:['Pays-Bas','Japon','Suède','Tunisie']
};

document.getElementById("groups").innerHTML = `
<div class="panel">
${Object.entries(groups).map(([g,t])=>`
<div class="group">
<b>Groupe ${g}</b><br>
${t.join("<br>")}
</div>
`).join("")}
</div>
`;

/* CALENDRIER */
let matches=[];
let date=new Date("2026-06-11T13:00");

Object.entries(groups).forEach(([g,t])=>{
matches.push({
home:t[0],away:t[1],group:g,
date:new Date(date)
});
date.setHours(date.getHours()+12);
});

document.getElementById("calendar").innerHTML=`
<div class="panel">
${matches.map(m=>`
<div class="match">
<b>${m.home} - ${m.away}</b><br>
<small>${m.date.toLocaleString()}</small>
</div>
`).join("")}
</div>
`;

/* TABS */
const tabs=[
{id:"groups",label:"Groupes"},
{id:"calendar",label:"Calendrier"}
];

document.getElementById("tabs").innerHTML =
tabs.map((t,i)=>`<div class="tab ${i===0?"active":""}" data-id="${t.id}">${t.label}</div>`).join("");

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab.dataset.id).classList.add("active");
};
});

</script>

</body>
</html>
