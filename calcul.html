<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calcul marche / footing</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0b1220;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
}

label{
  font-size:14px;
  color:#94a3b8;
}

input{
  width:100%;
  padding:14px;
  margin-top:6px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  font-size:22px;
}

.result{
  background:#111827;
  padding:16px;
  border-radius:12px;
  margin-bottom:10px;
}

.big{
  font-size:28px;
  font-weight:800;
}

.small{
  color:#94a3b8;
  font-size:14px;
}
</style>
</head>

<body>

<h1>Marche / Footing</h1>

<div class="card">

<label>Distance (km)</label>
<input id="distance" oninput="calc()">

<label>Temps (minutes)</label>
<input id="minutes" oninput="calc()">

<label>Longueur de pas (m)</label>
<input id="step" oninput="calc()" placeholder="0.70">

</div>

<div class="card">

<div class="result">
<div class="small">Vitesse</div>
<div class="big" id="speed">—</div>
</div>

<div class="result">
<div class="small">Allure</div>
<div class="big" id="pace">—</div>
</div>

<div class="result">
<div class="small">Nombre de pas</div>
<div class="big" id="steps">—</div>
</div>

</div>

<script>
function parse(v){
  if(!v) return 0;
  return parseFloat(v.replace(",", "."));
}

function calc(){

  let d = parse(distance.value);
  let m = parse(minutes.value);
  let step = parse(step.value);

  if(d<=0 || m<=0 || step<=0) return;

  let speed = d / (m/60);
  let pace = m / d;
  let steps = Math.round((d*1000)/step);

  speedEl.innerText = speed.toFixed(2) + " km/h";

  let min = Math.floor(pace);
  let sec = Math.round((pace-min)*60);

  paceEl.innerText = min + "'" + String(sec).padStart(2,'0') + "/km";

  stepsEl.innerText = steps;
}

const distance = document.getElementById("distance");
const minutes = document.getElementById("minutes");
const step = document.getElementById("step");

const speedEl = document.getElementById("speed");
const paceEl = document.getElementById("pace");
const stepsEl = document.getElementById("steps");
</script>

</body>
</html>
