var QT={};
(function(){var k,dq=JSON.parse(localStorage.getItem("cdm26q")||"null");if(dq){QT=dq;}else{for(k in DQ){QT[k]={star:DQ[k].star,deuil:DQ[k].deuil,effectif:DQ[k].effectif,psycho:DQ[k].psycho};}}})();
function svQ(){localStorage.setItem("cdm26q",JSON.stringify(QT));}
function qb(c){var q=QT[c];if(!q)return 0;return (q.star||0)+(q.deuil||0)+(q.effectif||0)+(q.psycho||0);}
function force(c){var rk=RK[c]||80,ct=FR[c]||500,fo=FM[c]||[],fp=0,i;for(i=0;i<fo.length;i++)fp+=(fo[i]==="V"?3:fo[i]==="N"?1:0);var rs=Math.max(0,(100-rk)/100);var cs=1-Math.min(1,Math.log(ct)/Math.log(1000));var fs=fp/15;return 0.55*rs+0.22*cs+0.13*fs+(HB[c]||0)+qb(c);}
function pred(a,b,sc){var fa=force(a),fb=force(b),d=fa-fb,ad=Math.abs(d),B=1.2,g1,g2,tot;if(sc===1){g1=B+2.0*d;g2=B-2.0*d;}else if(sc===2){if(ad<0.35){g1=1;g2=1;}else{g1=B+0.6*d;g2=B-0.6*d;}}else{if(ad>0.30){if(d>0){g1=0;g2=1;}else{g1=1;g2=0;}}else{g1=1;g2=1;}}g1=Math.round(Math.max(0,Math.min(5,g1)));g2=Math.round(Math.max(0,Math.min(5,g2)));tot=g1+g2;if(tot>5){g1=Math.round(g1*5/tot);g2=Math.round(g2*5/tot);}return [g1,g2];}
function bldP(sc){var p={},i,j,gr,ms,k,r;for(i=0;i<GR.length;i++){gr=GR[i];ms=mu(gr.t);for(j=0;j<ms.length;j++){k=ms[j][0]+"|"+ms[j][1];r=pred(ms[j][0],ms[j][1],sc);p[k]={s1:r[0],s2:r[1]};}}return p;}
var SC=1,MS={},PR={1:bldP(1),2:bldP(2),3:bldP(3)};

function eSC(k){return MS[k]||SC;}
function getS(k){var u=US[k];if(u&&u.s1!=null&&u.s2!=null)return{s:u,p:false};return{s:PR[eSC(k)][k],p:true};}
function mu(t){var r=[],i,j;for(i=0;i<t.length;i++)for(j=i+1;j<t.length;j++)r.push([t[i],t[j]]);return r;}
function fl(c){var iso=IS[c];if(!iso)return "<span class=cfp></span>";return "<img class=tfi src=//flagcdn.com/24x18/"+iso+".png>";}
function fls(c){var iso=IS[c];if(!iso)return "<span class=cfp></span>";return "<img class=cfi src=//flagcdn.com/24x18/"+iso+".png>";}
function fmH(c,r){var f=FM[c]||[],i,h="";for(i=0;i<f.length;i++)h+="<div class='fp "+f[i]+"'>"+f[i]+"</div>";return "<div class="+(r?"fmr":"fm")+">"+h+"</div>";}
function h2H(a,b){var d=H2[a+"|"+b]||H2[b+"|"+a],i,m,w,h="";if(!d||!d.length)return "<div class=h2h><span class=hl>H2H</span><span class=hn>Aucun affrontement r\u00e9cent</span></div>";for(i=0;i<d.length;i++){m=d[i];w=(m[3]&&m[3]!=="")?(" <span class=hw>"+(NM[m[3]]||m[3])+"</span>"):"";h+="<span class=hi>"+m[0]+" <b>"+m[1]+"</b> <span style='color:var(--dim)'>"+m[2]+"</span>"+w+"</span>";}return "<div class=h2h><span class=hl>H2H</span>"+h+"</div>";}
function msbH(k,asc,scored){var i,r,g1,g2,on,h="";if(scored)return "";h="<div class=msr>";for(i=1;i<=3;i++){r=pred(k.split("|")[0],k.split("|")[1],i);g1=r[0];g2=r[1];on=(asc===i)?" on":"";h+="<button class='msb s"+i+on+"' onclick='setMS(\""+k+"\","+i+")'><div class=ms>"+g1+"-"+g2+"</div><div class=ml>"+["","FAVORI","SERR\u00c9","SURPRISE"][i]+"</div></button>";}h+="</div>";return h;}
function mcH(t1,t2){var k=t1+"|"+t2,gs=getS(k),s=gs.s,asc=eSC(k),u=US[k]||{},sc=u.s1!=null&&u.s2!=null,r1=RK[t1]||99,r2=RK[t2]||99,h="";h="<div class='mc"+(sc?" sc":"")+"' id='mc"+k.replace("|","-")+"'>";h+=msbH(k,asc,sc);h+="<div class=mts>";h+="<div class=ti><div class=trow>"+fl(t1)+"<div class=tn>"+(NM[t1]||t1)+"</div></div><div class=tm>c\u00f4te <b style='color:var(--gold)'>"+(FR[t1]||"?")+"</b> &middot; FIFA #"+r1+"</div>"+fmH(t1,false)+"</div>";h+="<div class=sbox><input class=sinp id='i1"+k.replace("|","-")+"' type=number min=0 max=20 value='"+(sc?u.s1:"")+"' placeholder='"+(s?s.s1:"")+"' inputmode=numeric onchange='ss(\""+t1+"\",\""+t2+"\",\"s1\",this.value)' onfocus='this.select()'><div class=ssep>:</div><input class=sinp id='i2"+k.replace("|","-")+"' type=number min=0 max=20 value='"+(sc?u.s2:"")+"' placeholder='"+(s?s.s2:"")+"' inputmode=numeric onchange='ss(\""+t1+"\",\""+t2+"\",\"s2\",this.value)' onfocus='this.select()'></div>";h+="<div class=tir><div class=trowr>"+fl(t2)+"<div class=tn>"+(NM[t2]||t2)+"</div></div><div class=tmr>c\u00f4te <b style='color:var(--gold)'>"+(FR[t2]||"?")+"</b> &middot; FIFA #"+r2+"</div>"+fmH(t2,true)+"</div>";h+="</div>";h+=h2H(t1,t2)+"</div>";return h;}
function clas(gr){var t=gr.t,ms=mu(t),i,j,a,b,k,gs,s,g1,g2,arr=[];for(i=0;i<t.length;i++){var pts=0,bp=0,bc=0,jj=0;for(j=0;j<ms.length;j++){a=ms[j][0];b=ms[j][1];k=a+"|"+b;gs=getS(k);s=gs.s;if(!s||s.s1==null||s.s2==null)continue;g1=+s.s1;g2=+s.s2;if(t[i]===a){jj++;bp+=g1;bc+=g2;pts+=g1>g2?3:g1===g2?1:0;}if(t[i]===b){jj++;bp+=g2;bc+=g1;pts+=g2>g1?3:g1===g2?1:0;}}arr.push({e:t[i],pts:pts,df:bp-bc,bp:bp,j:jj});}arr.sort(function(x,y){return y.pts-x.pts||y.df-x.df||y.bp-x.bp;});return arr;}
function clH(gr){var cl=clas(gr),i,r,q,h="<div class=clas id='cl"+gr.g+"'>";for(i=0;i<cl.length;i++){r=cl[i];q=i<2?" q":"";h+="<div class='cr"+q+"'><div class=cp>"+(i+1)+"</div>"+fls(r.e)+"<div class='cn"+q+"'>"+(NM[r.e]||r.e)+"</div><div class=cpt>"+(r.j>0?r.pts+"pts":"&mdash;")+"</div><div class=cd>"+(r.j>0?(r.df>=0?"+":"")+r.df:"")+"</div></div>";}return h+"</div>";}
function grH(gr){var ms=mu(gr.t),i,tn="",mh="";for(i=0;i<gr.t.length;i++){if(i>0)tn+=" &middot; ";tn+="<b style='color:var(--txt)'>"+(NM[gr.t[i]]||gr.t[i])+"</b>";}for(i=0;i<ms.length;i++)mh+=mcH(ms[i][0],ms[i][1]);return "<div class=grp id='grp"+gr.g+"'><div class=grph><div class=grpl>"+gr.g+"</div><div style='font-size:10px;color:var(--dim);line-height:1.6'>"+tn+"</div></div>"+clH(gr)+"<div class=mbl>"+mh+"</div></div>";}
function renderAll(){var s=CG==="all"?GR:GR.filter(function(g){return g.g===CG;}),i,h="";for(i=0;i<s.length;i++)h+=grH(s[i]);document.getElementById("main").innerHTML=h;updC();}
function updCl(){var i,el,cl,h,r,j,q;for(i=0;i<GR.length;i++){el=document.getElementById("cl"+GR[i].g);if(!el)continue;cl=clas(GR[i]);h="";for(j=0;j<cl.length;j++){r=cl[j];q=j<2?" q":"";h+="<div class='cr"+q+"'><div class=cp>"+(j+1)+"</div>"+fls(r.e)+"<div class='cn"+q+"'>"+(NM[r.e]||r.e)+"</div><div class=cpt>"+(r.j>0?r.pts+"pts":"&mdash;")+"</div><div class=cd>"+(r.j>0?(r.df>=0?"+":"")+r.df:"")+"</div></div>";}el.innerHTML=h;}}
function updC(){var ns=0,np=0,i,j,ms,k,u;for(i=0;i<GR.length;i++){ms=mu(GR[i].t);for(j=0;j<ms.length;j++){k=ms[j][0]+"|"+ms[j][1];u=US[k];if(u&&u.s1!=null&&u.s2!=null)ns++;else np++;}}document.getElementById("cS").innerHTML=ns;document.getElementById("cP").innerHTML=np;}
function bldT(){var h="<button class='tab"+(CG==="all"?" on":"")+"' onclick='fg(\"all\")'>TOUS</button>",i;for(i=0;i<GR.length;i++)h+="<button class='tab"+(CG===GR[i].g?" on":"")+"' onclick='fg(\""+GR[i].g+"\")'>GRP "+GR[i].g+"</button>";document.getElementById("tabs").innerHTML=h;}

function openR(){var h="<div class=lbox>",i,cl,j,r,gr;h+="<div><span class=ldot style='background:var(--s1)'></span><b>FAVORI</b> &mdash; le favori s'impose nettement</div>";h+="<div><span class=ldot style='background:var(--s2)'></span><b>SERR\u00c9</b> &mdash; diff\u00e9rentiel att\u00e9nu\u00e9</div>";h+="<div><span class=ldot style='background:var(--s3)'></span><b>SURPRISE</b> &mdash; outsider r\u00e9siste (~18%)</div>";h+="<div style='margin-top:5px;font-size:8px'>55% FIFA + 22% cotes + 13% forme + bonus h\u00f4te + qualit.</div></div>";h+="<div style='font-size:9px;color:var(--dim);margin-bottom:10px'>Sc\u00e9nario : <b style='color:var(--s"+SC+")'>"+["","Favori","Serr\u00e9","Surprise"][SC]+"</b></div>";for(i=0;i<GR.length;i++){gr=GR[i];cl=clas(gr);h+="<div class=rs><div class=rst>GROUPE "+gr.g+"</div>";for(j=0;j<cl.length;j++){r=cl[j];h+="<div class=rr><div class=cp>"+(j+1)+"</div>"+fls(r.e)+"<div style='flex:1;font-size:11px;font-weight:600;color:"+(j<2?"#86efac":"#aaa")+"'>"+(NM[r.e]||r.e)+"</div><div style='font-size:10px;font-weight:700;color:var(--gold)'>"+(r.j>0?r.pts+"pts":"&mdash;")+"</div><div style='font-size:9px;color:var(--dim);min-width:26px;text-align:right'>"+(r.j>0?(r.df>=0?"+":"")+r.df:"")+"</div></div>";}h+="</div>";}document.getElementById("ovRc").innerHTML=h;}
var CM={star:{label:"Effet star",desc:"Joueur d\u00e9cisif",color:"#fbbf24",min:-0.10,max:0.15},deuil:{label:"Choc \u00e9mot.",desc:"Blessure/deuil",color:"#f87171",min:-0.15,max:0.05},effectif:{label:"Effectif",desc:"Qualit\u00e9 r\u00e9elle",color:"#60a5fa",min:-0.10,max:0.15},psycho:{label:"Mentalit\u00e9",desc:"Grands tournois",color:"#a78bfa",min:-0.10,max:0.12}};
var AT=["POR","FRA","ESP","ARG","ENG","BRA","GER","NED","MAR","COL","NOR","SEN","TUR","JPN","USA","MEX","CAN","URU","SUI","CRO","BEL","ECU","AUT","ALG","KOR","SWE","CZE","SCO","EGY","IRN","AUS","TUN","GHA","RSA","HAI","QAT","CPV","KSA","IRQ","JOR","CUW","BIH","COD","UZB","PAN","NZL","PAR","CIV"];

function renderQ(){var c=document.getElementById("ovQc");if(!c)return;var ts=AT.filter(function(t){return !AQF||(NM[t]||t).toLowerCase().indexOf(AQF.toLowerCase())>=0;});var h="<div class=mdh></div><div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px'><div class=mdt style='margin-bottom:0'>AJUSTEMENTS</div><button class=arb onclick='rstQ()'>Reset</button></div>";h+="<div style='font-size:9px;color:var(--dim);margin-bottom:10px;line-height:1.6'>Ajuste le score de force. Pr\u00e9dictions recalcul\u00e9es en temps r\u00e9el.</div>";h+="<input class=asr placeholder='Rechercher...' value='"+AQF+"' oninput='AQF=this.value;renderQ()'>";var ck=["star","deuil","effectif","psycho"],i,ti,code,q,tot,tc,iso,fh,ci,key,meta,val,vs,vc,pct,bg;for(ti=0;ti<ts.length;ti++){code=ts[ti];q=QT[code]||{star:0,deuil:0,effectif:0,psycho:0};tot=tqt(code);tc=tot>0.01?"pos":tot<-0.01?"neg":"neu";iso=IS[code];fh=iso?"<img style='width:20px;height:14px;border-radius:2px;object-fit:cover' src=//flagcdn.com/24x18/"+iso+".png>":"";h+="<div class=atb><div class=ath>"+fh+"<div class=atn>"+(NM[code]||code)+"</div><div class='ats "+tc+"'>Force "+(tot>0?"+":"")+tot.toFixed(2)+"</div></div>";for(ci=0;ci<ck.length;ci++){key=ck[ci];meta=CM[key];val=q[key]||0;vs=(val>0?"+":"")+val.toFixed(2);vc=val>0.005?"pos":val<-0.005?"neg":"neu";pct=((val-meta.min)/(meta.max-meta.min)*100).toFixed(0);bg="linear-gradient(to right,"+meta.color+" "+pct+"%,rgba(255,255,255,0.1) "+pct+"%)";h+="<div class=cr2><div class=cl><b>"+meta.label+"</b>"+meta.desc+"</div><input type=range class=csl min="+meta.min+" max="+meta.max+" step=0.01 value="+val+" style='background:"+bg+"' oninput='upQ(\""+code+"\",\""+key+"\",+this.value,this)'><div class='cv "+vc+"' id='qv"+code+key+"'>"+vs+"</div></div>";}h+="</div>";}c.innerHTML=h;}
function upQ(code,key,val,sl){if(!QT[code])QT[code]={star:0,deuil:0,effectif:0,psycho:0};QT[code][key]=val;svQ();var el=document.getElementById("qv"+code+key);if(el){el.innerHTML=(val>0?"+":"")+val.toFixed(2);el.className="cv "+(val>0.005?"pos":val<-0.005?"neg":"neu");}var meta=CM[key],pct=((val-meta.min)/(meta.max-meta.min)*100).toFixed(0);sl.style.background="linear-gradient(to right,"+meta.color+" "+pct+"%,rgba(255,255,255,0.1) "+pct+"%)";PR={1:bldP(1),2:bldP(2),3:bldP(3)};updCl();updC();}

(function(){var sv2=JSON.parse(localStorage.getItem("cdm26ms")||"null");if(sv2){if(sv2.g)SC=sv2.g;if(sv2.m)MS=sv2.m;}document.getElementById("gb1").className="sb s1"+(SC===1?" on":"");document.getElementById("gb2").className="sb s2"+(SC===2?" on":"");document.getElementById("gb3").className="sb s3"+(SC===3?" on":"");bldT();renderAll();})();
