var ml=agF===1?CAL.filter(function(m){return m[0]>="2026-06-08";}) : CAL;
var bd={},i,dt,d,ds,h="",ms,m,k,gs,s,sc2,g1,g2,iso1,iso2,f1,f2,hcl,scl;
for(i=0;i<ml.length;i++){dt=ml[i][0];if(!bd[dt])bd[dt]=[];bd[dt].push(ml[i]);}
var dts=Object.keys(bd).sort();
for(i=0;i<dts.length;i++){dt=dts[i];d=new Date(dt+"T12:00:00");
ds=JOURS[d.getDay()]+" "+d.getDate()+" "+MOIS[d.getMonth()];
h+="<div class='aday'><div class='adh'><span class='adb'>"+ds+"</span></div>";
ms=bd[dt];
for(var j=0;j<ms.length;j++){m=ms[j];k=m[2]+"|"+m[3];gs=getS(k);s=gs.s;
var u2=US[k]||{};sc2=u2.s1!=null&&u2.s2!=null;
g1=s?s.s1:"?";g2=s?s.s2:"?";
iso1=IS[m[2]];iso2=IS[m[3]];
f1=iso1?"<img style='width:18px;height:13px;border-radius:2px;object-fit:cover;flex-shrink:0' src='https://flagcdn.com/24x18/"+iso1+".png' alt=''>":"";
f2=iso2?"<img style='width:18px;height:13px;border-radius:2px;object-fit:cover;flex-shrink:0' src='https://flagcdn.com/24x18/"+iso2+".png' alt=''>":"";
var hr=parseInt(m[1]);hcl=(hr>=0&&hr<8)?"at2 lt":"at2";
scl=sc2?"asc":"asc pr";
h+="<div class='am"+(sc2?" sc":"")+"' onclick='fg(""+m[4]+"");closeOv("A");scrl(""+k+"")'>";
h+="<div class='"+hcl+"'>"+m[1]+"</div>";
h+="<div class='ag'>GRP "+m[4]+"</div>";
h+="<div class='atms'><div class='atm'>"+f1+"<div class='atnm'>"+(NM[m[2]]||m[2])+"</div></div>";
h+="<div class='"+scl+"'><span class='sc2'>"+g1+"</span><span class='sep'>-</span><span class='sc2'>"+g2+"</span></div>";
h+="<div class='atmr'>"+f2+"<div class='atnm'>"+(NM[m[3]]||m[3])+"</div></div></div>";
h+="<div class='aco'>"+(FR[m[2]]||"?")+"/"+( FR[m[3]]||"?")+"</div></div>";}
h+="</div>";}
c.innerHTML=h||"<div style='color:var(--dim);font-size:11px;padding:20px;text-align:center'>Aucun match</div>";}
function scrl(k){setTimeout(function(){var e=document.getElementById("mc"+k.replace("|","-"));if(e)e.scrollIntoView({behavior:"smooth",block:"center"});},300);}
var CM={star:{label:"Effet star",desc:"Joueur décisif",color:"#fbbf24",min:-0.10,max:0.15},deuil:{label:"Choc émot.",desc:"Blessure/deuil",color:"#f87171",min:-0.15,max:0.05},effectif:{label:"Effectif",desc:"Qualité réelle",color:"#60a5fa",min:-0.10,max:0.15},psycho:{label:"Mentalité",desc:"Grands tournois",color:"#a78bfa",min:-0.10,max:0.12}};
var AT=["POR","FRA","ESP","ARG","ENG","BRA","GER","NED","MAR","COL","NOR","SEN","TUR","JPN","USA","MEX","CAN","URU","SUI","CRO","BEL","ECU","AUT","ALG","KOR","SWE","CZE","SCO","EGY","IRN","AUS","TUN","GHA","RSA","HAI","QAT","CPV","KSA","IRQ","JOR","CUW","BIH","COD","UZB","PAN","NZL","PAR","CIV"];
var AQF="";
function tqt(c){var q=QT[c]||{star:0,deuil:0,effectif:0,psycho:0};return (q.star||0)+(q.deuil||0)+(q.effectif||0)+(q.psycho||0);}
function renderQt(){var c=document.getElementById("ovQc");if(!c)return;
var ts=AT.filter(function(t){return !AQF||(NM[t]||t).toLowerCase().indexOf(AQF.toLowerCase())>=0;});
var h="<div class='mdh'></div><div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px'><div class='mdt' style='margin-bottom:0'>AJUSTEMENTS</div><button class='arb' onclick='rstQ()'>Reset</button></div>";
h+="<div style='font-size:9px;color:var(--dim);margin-bottom:10px;line-height:1.6'>Ajuste le score de force. Prédictions recalculées en temps réel.</div>";
h+="<input class='asr' placeholder='Rechercher...' value='"+AQF+"' oninput='AQF=this.value;renderQt()'>";
var ck=["star","deuil","effectif","psycho"],i,ti,code,q,tot,tc,iso,fh,ci,key,meta,val,vs,vc,pct,bg;
for(ti=0;ti<ts.length;ti++){code=ts[ti];q=QT[code]||{star:0,deuil:0,effectif:0,psycho:0};
tot=tqt(code);tc=tot>0.01?"pos":tot<-0.01?"neg":"neu";
iso=IS[code];fh=iso?"<img style='width:20px;height:14px;border-radius:2px;object-fit:cover' src='https://flagcdn.com/24x18/"+iso+".png' alt=''>":"";
h+="<div class='atb'><div class='ath'>"+fh+"<div class='atn'>"+(NM[code]||code)+"</div><div class='ats "+tc+"'>Force "+(tot>0?"+":"")+tot.toFixed(2)+"</div></div>";
for(ci=0;ci<ck.length;ci++){key=ck[ci];meta=CM[key];val=q[key]||0;
vs=(val>0?"+":"")+val.toFixed(2);vc=val>0.005?"pos":val<-0.005?"neg":"neu";
pct=((val-meta.min)/(meta.max-meta.min)*100).toFixed(0);
bg="linear-gradient(to right,"+meta.color+" "+pct+"%,rgba(255,255,255,0.1) "+pct+"%)";
h+="<div class='cr2'><div class='cl'><b>"+meta.label+"</b>"+meta.desc+"</div>";
h+="<input type='range' class='csl' min='"+meta.min+"' max='"+meta.max+"' step='0.01' value='"+val+"' style='background:"+bg+"' oninput='upQ(""+code+"",""+key+"",+this.value,this)'>";
h+="<div class='cv "+vc+"' id='qv"+code+key+"'>"+vs+"</div></div>";}
h+="</div>";}
c.innerHTML=h;}
function upQ(code,key,val,sl){
if(!QT[code])QT[code]={star:0,deuil:0,effectif:0,psycho:0};
QT[code][key]=val;svQ();
var el=document.getElementById("qv"+code+key);
if(el){el.innerHTML=(val>0?"+":"")+val.toFixed(2);el.className="cv "+(val>0.005?"pos":val<-0.005?"neg":"neu");}
var meta=CM[key],pct=((val-meta.min)/(meta.max-meta.min)*100).toFixed(0);
sl.style.background="linear-gradient(to right,"+meta.color+" "+pct+"%,rgba(255,255,255,0.1) "+pct+"%)";
PR={1:bldP(1),2:bldP(2),3:bldP(3)};updClas();updC();}
function rstQ(){if(confirm("Remettre les valeurs par défaut?")){
var k;QT={};for(k in DQ)QT[k]={star:DQ[k].star,deuil:DQ[k].deuil,effectif:DQ[k].effectif,psycho:DQ[k].psycho};
svQ();PR={1:bldP(1),2:bldP(2),3:bldP(3)};updClas();updC();renderQt();}}
function doReset(){if(confirm("Effacer vos scores?")){US={};svS();renderAll();}}
(function(){
var sv2=JSON.parse(localStorage.getItem("cdm26ms")||"null");
if(sv2){if(sv2.g)SC=sv2.g;if(sv2.m)MS=sv2.m;}
document.getElementById("gb1").className="sbtn s1"+(SC===1?" on":"");
document.getElementById("gb2").className="sbtn s2"+(SC===2?" on":"");
document.getElementById("gb3").className="sbtn s3"+(SC===3?" on":"");
bldTabs();renderAll();
})();
</script>
</body>
</html>
