<meta name="theme-color" content="#060d1a">
<title>CDM 2026 · Grille</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060d1a;
  --bg2:#0c1526;
  --bg3:#111d32;
  --card:#0f1c2e;
  --border:rgba(255,255,255,0.07);
  --gold:#f0a500;
  --gold2:#ffd166;
  --green:#2ecc71;
  --red:#e74c3c;
  --amber:#f39c12;
  --text:#e8edf5;
  --muted:#5a6a80;
  --accent:#1a7cfa;
}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(to bottom,rgba(6,13,26,0.98),rgba(6,13,26,0.92));
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(240,165,0,0.2);
  padding:12px 16px 10px;
}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:2px;color:var(--gold);line-height:1}
.header-sub{font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:2px}
.header-score{font-size:10px;color:var(--muted);text-align:right;line-height:1.5}
.header-score span{color:var(--green);font-weight:700}

/* TABS GROUPES */
.group-tabs{
  display:flex;gap:5px;padding:10px 14px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.group-tabs::-webkit-scrollbar{display:none}
.gtab{
  flex-shrink:0;padding:5px 10px;border-radius:20px;font-size:10px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  cursor:pointer;transition:all .2s;
}
.gtab.active{background:var(--gold);color:#000;border-color:var(--gold)}

/* MAIN */
main{padding:12px 12px 80px}

/* GROUPE BLOCK */
.groupe{margin-bottom:20px}
.groupe-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:linear-gradient(135deg,rgba(240,165,0,0.12),rgba(240,165,0,0.04));
  border:1px solid rgba(240,165,0,0.2);
  border-radius:12px 12px 0 0;
  margin-bottom:1px;
}
.groupe-letter{
  font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;
  color:var(--gold);line-height:1;min-width:28px;
}
.groupe-teams{font-size:10px;color:var(--muted);line-height:1.6}
.groupe-teams b{color:var(--text);font-weight:600}

/* CLASSEMENT MINI */
.classement{
  background:var(--bg3);border:1px solid var(--border);
  border-top:none;padding:8px 10px;margin-bottom:1px;
}
.clas-row{
  display:flex;align-items:center;gap:6px;
  padding:4px 6px;border-radius:6px;margin-bottom:2px;
  transition:background .2s;
}
.clas-row.qual{background:rgba(46,204,113,0.07)}
.clas-pos{font-size:9px;color:var(--muted);width:12px;text-align:center}
.clas-flag{width:20px;height:14px;border-radius:2px;object-fit:cover;flex-shrink:0}
.clas-flag-ph{width:20px;height:14px;border-radius:2px;background:var(--bg3);flex-shrink:0}
.clas-nom{flex:1;font-size:10px;font-weight:600;color:var(--text)}
.clas-nom.qual{color:#86efac}
.clas-pts{font-size:10px;font-weight:700;color:var(--gold);min-width:32px;text-align:right}
.clas-diff{font-size:9px;color:var(--muted);min-width:24px;text-align:right}

/* MATCHS */
.matchs-block{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}

.match-card{
  padding:12px 12px;border-bottom:1px solid var(--border);
  transition:background .15s;
}
.match-card:last-child{border-bottom:none}
.match-card.scored{background:rgba(26,124,250,0.04)}

.match-teams{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.team-info{flex:1}
.team-info.right{text-align:right}
.team-row{display:flex;align-items:center;gap:5px}
.team-row.right{flex-direction:row-reverse}
.team-flag{width:22px;height:15px;border-radius:2px;object-fit:cover;flex-shrink:0}
.team-flag-ph{width:22px;height:15px;border-radius:2px;background:var(--bg3);flex-shrink:0}
.team-name{font-size:12px;font-weight:700;color:var(--text);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.team-cote{font-size:9px;color:var(--gold);margin-top:2px}
.team-cote b{font-size:10px}
.forme{display:flex;gap:2px;margin-top:3px}
.forme.right{justify-content:flex-end}
.fp{width:13px;height:13px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;flex-shrink:0}
.fp.V{background:var(--green)}
.fp.N{background:var(--amber)}
.fp.D{background:var(--red)}

/* SCORE INPUT */
.score-box{display:flex;align-items:center;gap:5px;flex-shrink:0}
.score-input{
  width:36px;height:36px;border-radius:8px;
  border:2px solid rgba(240,165,0,0.3);
  background:rgba(240,165,0,0.08);
  color:var(--text);font-size:18px;font-weight:800;
  text-align:center;outline:none;
  font-family:'Barlow Condensed',sans-serif;
  transition:border-color .2s;
  -webkit-appearance:none;
}
.score-input:focus{border-color:var(--gold)}
.score-sep{color:var(--muted);font-size:18px;font-weight:700}

/* H2H */
.h2h{
  display:flex;flex-wrap:wrap;gap:4px;
  padding-top:7px;border-top:1px solid var(--border);
  align-items:center;
}
.h2h-label{font-size:8px;color:var(--muted);letter-spacing:1px;margin-right:2px}
.h2h-item{
  font-size:8px;padding:2px 7px;border-radius:20px;
  background:rgba(255,255,255,0.05);color:#8a9ab0;
}
.h2h-item b{color:var(--text)}
.h2h-item .win{color:#86efac}
.h2h-none{font-size:8px;color:var(--muted);font-style:italic}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(6,13,26,0.97);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 0;background:none;border:none;color:var(--muted);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;
  transition:color .2s;
}
.bnav-btn.active{color:var(--gold)}
.bnav-icon{font-size:18px;line-height:1}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:20px 20px 0 0;width:100%;max-height:85vh;
  overflow-y:auto;padding:20px 16px max(20px,env(safe-area-inset-bottom));
}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  color:var(--gold);letter-spacing:2px;margin-bottom:14px}

/* RESUME */
.resume-section{margin-bottom:16px}
.resume-title{font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;font-family:'Barlow Condensed',sans-serif}
.resume-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.resume-row:last-child{border-bottom:none}

/* UTIL */
.hidden{display:none!important}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
</style>
</head>

function getKey(a,b){ return `${a}|${b}`; }

function matchups(teams){
  const r=[];
  for(let i=0;i<teams.length;i++)
    for(let j=i+1;j<teams.length;j++)
      r.push([teams[i],teams[j]]);
  return r;
}

function flag(code){

}

    ms.forEach(([a,b])=>{
      const k=getKey(a,b), s=scores[k];
      if(!s||s.s1==null||s.s2==null) return;
      const g1=+s.s1, g2=+s.s2;
      if(eq===a){j++;bp+=g1;bc+=g2;pts+=g1>g2?3:g1===g2?1:0;}
      if(eq===b){j++;bp+=g2;bc+=g1;pts+=g2>g1?3:g1===g2?1:0;}
    });
    return {eq,pts,diff:bp-bc,bp,j};
  }).sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.bp-a.bp);
}

function renderClassement(groupe){
  const cl = classement(groupe);
  return `<div class="classement">${cl.map((row,i)=>`
    <div class="clas-row${i<2?' qual':''}">
      <div class="clas-pos">${i+1}</div>
      ${flagSm(row.eq)}
      <div class="clas-nom${i<2?' qual':''}">${NOM[row.eq]||row.eq}</div>
      <div class="clas-pts">${row.j>0?row.pts+'pts':'—'}</div>
      <div class="clas-diff">${row.j>0?(row.diff>=0?'+':'')+row.diff:''}</div>
    </div>`).join('')}</div>`;
}

function renderH2H(a,b){
  const data = H2H[`${a}|${b}`] || H2H[`${b}|${a}`];
  if(!data||data.length===0) return `<div class="h2h"><span class="h2h-label">H2H</span><span class="h2h-none">Aucun affrontement récent</span></div>`;
  const items = data.map(([date,score,comp,win])=>{
    const winStr = win&&win!=='—' ? ` <span class="win">${NOM[win]||win}</span>` : '';
    return `<span class="h2h-item">${date} <b>${score}</b> <span style="color:var(--muted)">${comp}</span>${winStr}</span>`;
  }).join('');
  return `<div class="h2h"><span class="h2h-label">H2H</span>${items}</div>`;
}

function renderMatch(t1,t2){
  const k = getKey(t1,t2);
  const s = scores[k]||{};
  const s1 = s.s1!=null?s.s1:'';
  const s2 = s.s2!=null?s.s2:'';
  const c1 = COTES[t1]||'?', c2 = COTES[t2]||'?';
  const scored = s.s1!=null&&s.s2!=null;
  return `<div class="match-card${scored?' scored':''}">
    <div class="match-teams">
      <div class="team-info">
        <div class="team-row">
          ${flag(t1)}
          <div class="team-name">${NOM[t1]||t1}</div>
        </div>
        <div class="team-cote">cote&nbsp;<b>${c1}</b></div>
        ${formeHtml(t1)}
      </div>
      <div class="score-box">
        <input class="score-input" type="number" min="0" max="20" value="${s1}"
          inputmode="numeric" placeholder="—"
          onchange="setScore('${t1}','${t2}','s1',this.value)"
          onfocus="this.select()">
        <div class="score-sep">:</div>
        <input class="score-input" type="number" min="0" max="20" value="${s2}"
          inputmode="numeric" placeholder="—"
          onchange="setScore('${t1}','${t2}','s2',this.value)"
          onfocus="this.select()">
      </div>
      <div class="team-info right">
        <div class="team-row right">
          ${flag(t2)}
          <div class="team-name">${NOM[t2]||t2}</div>
        </div>
        <div class="team-cote" style="text-align:right">cote&nbsp;<b>${c2}</b></div>
        ${formeHtml(t2,true)}
      </div>
    </div>
    ${renderH2H(t1,t2)}
  </div>`;
}

function renderGroupe(groupe){
  const ms = matchups(groupe.teams);
  const teamList = groupe.teams.map(t=>NOM[t]||t).join(' · ');
  return `<div class="groupe" id="groupe-${groupe.g}">
    <div class="groupe-header">
      <div class="groupe-letter">${groupe.g}</div>
      <div class="groupe-teams">${groupe.teams.map(t=>`<b>${NOM[t]||t}</b>`).join(' &middot; ')}</div>
    </div>
    ${renderClassement(groupe)}
    <div class="matchs-block">
      ${ms.map(([a,b])=>renderMatch(a,b)).join('')}
    </div>
  </div>`;
}

function setScore(t1,t2,field,val){
  const k=getKey(t1,t2);
  if(!scores[k]) scores[k]={s1:null,s2:null};
  scores[k][field] = val===''?null:+val;
  saveScores();
  updateClassements();
  updateCounter();
}

function updateClassements(){
  GROUPES.forEach(groupe=>{
    const el = document.getElementById(`classe-${groupe.g}`);
    if(!el) return;
    const cl = classement(groupe);
    el.innerHTML = cl.map((row,i)=>`
      <div class="clas-row${i<2?' qual':''}">
        <div class="clas-pos">${i+1}</div>
        ${flagSm(row.eq)}
        <div class="clas-nom${i<2?' qual':''}">${NOM[row.eq]||row.eq}</div>
        <div class="clas-pts">${row.j>0?row.pts+'pts':'—'}</div>
        <div class="clas-diff">${row.j>0?(row.diff>=0?'+':'')+row.diff:''}</div>
      </div>`).join('');
  });
}

function updateCounter(){
  let n=0;
  Object.values(scores).forEach(s=>{if(s.s1!=null&&s.s2!=null)n++;});
  document.getElementById('countScored').textContent=n;
}

function renderAll(){
  const main = document.getElementById('main');
  const groups = currentGroup==='all' ? GROUPES : GROUPES.filter(g=>g.g===currentGroup);
  main.innerHTML = groups.map(renderGroupe).join('');
  // Patch: add IDs to classement divs
  GROUPES.forEach(groupe=>{
    const block = document.querySelector(`#groupe-${groupe.g} .classement`);
    if(block) block.id=`classe-${groupe.g}`;
  });
  updateCounter();
}

function buildTabs(){
  const tabs = document.getElementById('groupTabs');
  tabs.innerHTML = `<button class="gtab${currentGroup==='all'?' active':''}" data-g="all" onclick="filterGroup('all')">TOUS</button>`;
  GROUPES.forEach(g=>{
    tabs.innerHTML += `<button class="gtab${currentGroup===g.g?' active':''}" data-g="${g.g}" onclick="filterGroup('${g.g}')">GRP ${g.g}</button>`;
  });
}

function filterGroup(g){
  currentGroup=g;
  buildTabs();
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showView(v){
  currentView=v;
  document.getElementById('btnGrille').classList.toggle('active',v==='grille');
  document.getElementById('btnResume').classList.toggle('active',v==='resume');
  if(v==='resume') openResume();
}

function openResume(){
  const modal = document.getElementById('resumeModal');
  const content = document.getElementById('resumeContent');
  let html = '';
  GROUPES.forEach(groupe=>{
    const cl = classement(groupe);
    html += `<div class="resume-section">
      <div class="resume-title">GROUPE ${groupe.g}</div>`;
    cl.forEach((row,i)=>{
      const s = scores[getKey(cl[0].eq,row.eq)] || {};
      html += `<div class="resume-row">
        <div class="clas-pos">${i+1}</div>
        ${flagSm(row.eq)}
        <div style="flex:1;font-size:11px;font-weight:600;color:${i<2?'#86efac':'#aaa'}">${NOM[row.eq]||row.eq}</div>
        <div style="font-size:10px;font-weight:700;color:var(--gold)">${row.j>0?row.pts+'pts':'—'}</div>
        <div style="font-size:9px;color:var(--muted);min-width:28px;text-align:right">${row.j>0?(row.diff>=0?'+':'')+row.diff:''}</div>
      </div>`;
    });
    html += `</div>`;
  });
  content.innerHTML = html;
  modal.classList.add('open');
}

function closeModal(){
  document.getElementById('resumeModal').classList.remove('open');
  document.getElementById('btnResume').classList.remove('active');
  document.getElementById('btnGrille').classList.add('active');
  currentView='grille';
}

function confirmReset(){
  if(confirm('Effacer tous les scores ?')){
    scores={};
    saveScores();
    renderAll();
  }
}

// Init
buildTabs();
renderAll();
</script>
</body>
</html>
