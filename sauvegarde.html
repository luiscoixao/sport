<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sauvegarde Sport</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:15px 20px;
margin:10px;
border-radius:12px;
border:none;
font-size:16px;
background:#22c55e;
color:white;
}

.info{
margin-top:20px;
font-size:14px;
color:#cbd5e1;
}
</style>
</head>

<body>

<h2>Sauvegarde données sport</h2>

<button onclick="exportData()">Exporter les données</button>

<button onclick="importData()">Importer des données</button>

<input type="file" id="fileInput" style="display:none">

<div class="info" id="info"></div>

<script>

const STORAGE_KEY="sport-quotidien-v2"

function exportData(){

const data=localStorage.getItem(STORAGE_KEY)

if(!data){
alert("Aucune donnée trouvée")
return
}

const blob=new Blob([data],{type:"application/json"})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="sport-sauvegarde.json"
a.click()

URL.revokeObjectURL(url)

document.getElementById("info").innerText="Sauvegarde téléchargée"

}

function importData(){

document.getElementById("fileInput").click()

}

document.getElementById("fileInput").addEventListener("change",function(e){

const file=e.target.files[0]

if(!file)return

const reader=new FileReader()

reader.onload=function(event){

localStorage.setItem(STORAGE_KEY,event.target.result)

document.getElementById("info").innerText="Import terminé"

}

reader.readAsText(file)

})

</script>

</body>
</html>
