<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sport Quotidien</title>

<link rel="apple-touch-icon" href="Icon.PNG">
<link rel="icon" href="Icon.PNG">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:linear-gradient(180deg,#0f2e1e,#07140d);
color:white;
margin:0;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:5px;
}

.subtitle{
color:#cbd5e1;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:18px;
padding:20px;
margin-bottom:20px;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.calendar-title{
font-weight:700;
font-size:20px;
}

.calendar-nav button{
background:rgba(255,255,255,0.1);
border:none;
color:white;
font-size:20px;
border-radius:10px;
padding:6px 12px;
}

.calendar-weekdays,
.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.weekday{
text-align:center;
color:#cbd5e1;
font-size:14px;
}

.calendar-day{
height:58px;
border-radius:12px;
display:flex;
align-items:flex-start;
justify-content:flex-start;
padding:8px;
font-weight:700;
cursor:pointer;
}

.calendar-day.today{
outline:3px solid #38bdf8;
}

.day-green{
background:#1f6f44;
}

.day-orange{
background:#7a5c22;
}

.day-red{
background:#3a2b1d;
}

.calendar-day.empty{
background:none;
}

.legend{
margin-top:10px;
font-size:13px;
color:#cbd5e1;
display:flex;
gap:10px;
}

.form-grid{
display:grid;
gap:10px;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.15);
color:white;
}

button{
background:#22c55e;
border:none;
padding:12px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.entry{
background:rgba(255,255,255,0.08);
border-radius:12px;
padding:12px;
margin-bottom:10px;
}

.entry-title{
font-weight:700;
}

</style>
</head>

<body>

<h1>Sport Quotidien</h1>
<div class="subtitle">Calendrier mensuel, activités, allure, calories et poids.</div>

<div class="card">

<div class="calendar-header">
<div class="calendar-title" id="calendarTitle"></div>
<div class="calendar-nav">
<button id="prevMonthBtn">‹</button>
<button id="nextMonthBtn">›</button>
</div>
</div>

<div class="calendar-weekdays">
<div class="weekday">Lun</div>
<div class="weekday">Mar</div>
<div class="weekday">Mer</div>
<div class="weekday">Jeu</div>
<div class="weekday">Ven</div>
<div class="weekday">Sam</div>
<div class="weekday">Dim</div>
</div>

<div id="calendar" class="calendar-grid"></div>

<div class="legend">
<span>🔵 jour actuel</span>
<span>🟢 activité significative</span>
<span>🟠 activité légère</span>
<span>🔴 aucune activité</span>
</div>

</div>

<div class="card">

<h3>Nouvelle activité</h3>

<form id="sportForm" class="form-grid">

<input type="date" id="date">

<select id="type">
<option>Marche</option>
<option>Footing</option>
<option>Futsal</option>
<option>VTT</option>
<option>Vélo elliptique</option>
<option>Natation</option>
</select>

<input type="number" id="km" placeholder="km">

<input type="number" id="minutes" placeholder="minutes">

<input type="number" id="calories" placeholder="calories">

<input type="number" id="weight" placeholder="poids kg">

<button type="submit">Enregistrer</button>

</form>

</div>

<div class="card">

<h3>Historique du jour</h3>

<div id="entries"></div>

</div>

<script>

const STORAGE_KEY="sport-app";
let entries=[];
let selectedDate=new Date().toISOString().slice(0,10);

function load(){
entries=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(entries));
}

function getDailyTotals(date){

const list=entries.filter(e=>e.date===date);

let km=0;
let minutes=0;

list.forEach(e=>{
km+=Number(e.km);
minutes+=Number(e.minutes);
});

return{km,minutes,count:list.length};

}

function getLevel(date){

const t=getDailyTotals(date);

if(!t.count)return"red";
if(t.km>=5||t.minutes>=40)return"green";
return"orange";

}

function renderCalendar(){

const calendar=document.getElementById("calendar");
calendar.innerHTML="";

const now=new Date();
const year=now.getFullYear();
const month=now.getMonth();

const first=new Date(year,month,1);
const last=new Date(year,month+1,0);

document.getElementById("calendarTitle").innerText=
first.toLocaleString("fr",{month:"long"})+" "+year;

let start=(first.getDay()+6)%7;

for(let i=0;i<start;i++){
let div=document.createElement("div");
div.className="calendar-day empty";
calendar.appendChild(div);
}

for(let d=1;d<=last.getDate();d++){

let date=year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

let div=document.createElement("div");

div.className="calendar-day day-"+getLevel(date);

if(date===new Date().toISOString().slice(0,10))
div.classList.add("today");

div.innerText=d;

div.onclick=()=>{
selectedDate=date;
renderEntries();
};

calendar.appendChild(div);

}

}

function renderEntries(){

const container=document.getElementById("entries");
container.innerHTML="";

entries.filter(e=>e.date===selectedDate).forEach(e=>{

let div=document.createElement("div");
div.className="entry";

div.innerHTML=`
<div class="entry-title">${e.type}</div>
${e.km} km • ${e.minutes} min • ${e.calories} kcal
`;

container.appendChild(div);

});

}

document.getElementById("sportForm").onsubmit=function(e){

e.preventDefault();

entries.push({
date:date.value,
type:type.value,
km:km.value,
minutes:minutes.value,
calories:calories.value,
weight:weight.value
});

save();
renderCalendar();
renderEntries();

};

load();
renderCalendar();
renderEntries();

</script>

</body>
</html>
