<style>
:root{

  --shadow:0 18px 40px rgba(0,0,0,.30); --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:radial-gradient(circle at top left,#1a4b34 0%, #0d2b1e 28%, #07150f 72%, #041008 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif}
body{min-height:100vh;padding:14px 12px 26px}
.app{max-width:1240px;margin:0 auto}
.hero{position:sticky;top:0;z-index:20;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:linear-gradient(180deg,rgba(7,21,15,.96),rgba(7,21,15,.86));padding:2px 0 12px}
.heroCard{background:linear-gradient(135deg,rgba(142,226,122,.18),rgba(57,196,106,.14));border:1px solid rgba(255,255,255,.10); border-radius:28px; padding:18px 16px; box-shadow:var(--shadow)}
.heroTop{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:flex-start}
h1{margin:0 0 6px;font-size:clamp(30px,6vw,54px);line-height:.95;letter-spacing:-.03em}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--text);font-size:12px;border:1px solid rgba(255,255,255,.08)}
.tabs{display:flex;gap:8px;overflow:auto;padding:14px 0 4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;background:rgba(255,255,255,.07);color:var(--muted);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px 16px;font:inherit;font-weight:700;cursor:pointer}
.tab.active{background:linear-gradient(135deg,rgba(142,226,122,.20),rgba(57,196,106,.20));color:var(--text);border-color:rgba(142,226,122,.35)}
.section{display:none}.section.active{display:block}

.panelHeader{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.panel h2,.panel h3{margin:0;letter-spacing:-.03em}
.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;color:var(--muted)}
.groupsGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.groupCard,.probaCard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:14px}
.groupHeader{display:block;margin-bottom:10px}
.groupLetter{font-size:22px;font-weight:800}
.tableWrap{overflow:auto}
.standings,.thirdsTable{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.standings th,.standings td,.thirdsTable th,.thirdsTable td{padding:10px 6px;border-bottom:1px solid rgba(255,255,255,.07);vertical-align:middle}
.standings th:first-child,.standings td:first-child,.thirdsTable th:first-child,.thirdsTable td:first-child,.thirdsTable th:nth-child(2),.thirdsTable td:nth-child(2){text-align:left}
.standings th:not(:first-child),.standings td:not(:first-child),.thirdsTable th:not(:first-child),.thirdsTable td:not(:first-child){text-align:center}
.standings tr:last-child td,.thirdsTable tr:last-child td{border-bottom:none}
.standings th:nth-child(1),.standings td:nth-child(1){width:58%}
.standings th:nth-child(2),.standings td:nth-child(2){width:10%}
.standings th:nth-child(3),.standings td:nth-child(3){width:8%}
.standings th:nth-child(4),.standings td:nth-child(4){width:12%}
.standings th:nth-child(5),.standings td:nth-child(5){width:12%}
.calendarStage{margin-top:18px}.calendarStage:first-child{margin-top:0}
.stageTitle{font-size:18px;font-weight:800;margin:0 0 10px;letter-spacing:-.03em}
.matchesCompact{display:grid;gap:8px}
.matchCard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 12px}
.matchTop{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;font-size:12px;color:var(--muted)}
.matchMain{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
.teamCol{display:grid;gap:6px}
.teamCol.home{text-align:right}.teamCol.away{text-align:left}
.team{font-weight:800;font-size:15px;line-height:1.2}
.odds{font-size:12px;color:var(--muted)}
.scoreWrap{display:flex;align-items:center;gap:6px;justify-content:center}
.scoreInput{
  width:52px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);

.vs{display:flex;align-items:center;justify-content:center;min-width:42px;padding:6px 10px;border-radius:11px;background:linear-gradient(135deg,rgba(142,226,122,.15),rgba(57,196,106,.15));border:1px solid rgba(255,255,255,.10);font-weight:800;font-size:12px}
.venue{margin-top:8px;color:var(--muted);font-size:12px}
.rank{width:28px;height:28px;border-radius:999px;display:grid;place-items:center;background:rgba(255,209,102,.18);color:#ffe7a6;font-size:12px;font-weight:800}
.probaGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.probaTop{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}
.probaTeam{font-weight:800;font-size:18px}.probaPct{font-weight:800}
.bar{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}
.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--accent))}
.note{font-size:12px;color:var(--muted);margin-top:12px}
.matchCode{display:inline-flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);font-size:12px;font-weight:800;color:var(--text)}

.betSummaryGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.summaryCard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px}
.summaryLabel{font-size:12px;color:var(--muted);margin-bottom:8px}
.summaryValue{font-size:28px;font-weight:800}
.betControls{display:grid;grid-template-columns:220px 1fr;gap:14px;align-items:end}
.field{display:grid;gap:8px}
.field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.moneyInput{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:var(--text);padding:10px 12px;font:inherit}
.betCard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px}
.betMeta{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-bottom:8px}
.betTeams{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
.betCenter{display:grid;gap:8px;justify-items:center}
.betRow{display:grid;grid-template-columns:1fr 90px;gap:10px;align-items:center}
.betChoice{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:var(--text);padding:10px 12px;font:inherit;width:100%}
.betResult{font-size:12px;color:var(--muted);margin-top:6px}

.loseText{color:#ffb0b0}

function computePredictedTables(){
  const tables={};
  Object.entries(GROUPS).forEach(([letter,teams])=>{
    tables[letter]=teams.map(team=>({team,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}));
  });
  return tables;
}

function computeTables(){
  const tables = computePredictedTables();
  state.matches.filter(m => m.stage === 'Phase de groupes' && m.group && m.homeScore !== '' && m.awayScore !== '').forEach(match => {
    const table = tables[match.group];
    if(!table) return;
    const home = table.find(r => r.team === match.home);
    const away = table.find(r => r.team === match.away);
    if(!home || !away) return;
    const hs = Number(match.homeScore), as = Number(match.awayScore);
    home.p++; away.p++;
    home.gf += hs; home.ga += as;
    away.gf += as; away.ga += hs;
    if(hs > as){home.w++; away.l++; home.pts += 3;}
    else if(as > hs){away.w++; home.l++; away.pts += 3;}
    else{home.d++; away.d++; home.pts++; away.pts++;}
    home.gd = home.gf - home.ga; away.gd = away.gf - away.ga;
  });
  Object.values(tables).forEach(table => table.sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.team.localeCompare(b.team)));
  return tables;
}

function bestThirds(tables){
  return Object.entries(tables).map(([group,rows])=>({group,...rows[2]}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.team.localeCompare(b.team));
}

function setScore(id, side, value){
  const match = getMatch(id);

  if(value === '') match[side] = '';

  }
  saveState();
}


function decimalOdds(team){
  const frac = state.odds[team];
  if(!frac) return null;
  return Number(frac);
}
function getMatchOutcome(match){
  if(match.homeScore==='' || match.awayScore==='') return '';
  const hs = Number(match.homeScore), as = Number(match.awayScore);
  if(hs>as) return 'home';
  if(as>hs) return 'away';
  return 'draw';
}
function getBetPayout(match){
  const amount = Number(match.betAmount || 0);
  const sel = match.betSelection || '';
  if(!amount || amount <= 0 || !sel) return {status:'none', payout:0, profit:0};
  const outcome = getMatchOutcome(match);
  if(!outcome) return {status:'pending', payout:0, profit:0};

  let oddsDec = null;
  if(sel==='home') oddsDec = decimalOdds(match.home);
  else if(sel==='away') oddsDec = decimalOdds(match.away);
  else if(sel==='draw') oddsDec = 4.0;

  if(!oddsDec) return {status:'pending', payout:0, profit:0};

  if(sel === outcome){
    const payout = amount * oddsDec;
    return {status:'win', payout, profit:payout-amount};
  }
  return {status:'lose', payout:0, profit:-amount};
}
function computeBetSummary(){
  const bets = state.matches.filter(m => Number(m.betAmount||0) > 0 && m.betSelection);
  let committed = 0, settledProfit = 0, pending = 0;
  bets.forEach(m=>{
    const amount = Number(m.betAmount||0);
    committed += amount;
    const res = getBetPayout(m);
    if(res.status==='pending') pending += amount;
    else if(res.status==='win' || res.status==='lose') settledProfit += res.profit;
  });
  return {
    bankroll: Number(state.bankroll || 0),
    committed,
    pending,
    settledProfit,
    currentValue: Number(state.bankroll || 0) + settledProfit
  };
}
function setBankroll(value){
  const n = Number(String(value).replace(',','.'));
  state.bankroll = Number.isFinite(n) ? Math.max(0,n) : 0;
  saveState();
}
function setBet(id, field, value){
  const match = getMatch(id);
  if(!match) return;
  if(field==='betAmount'){
    const clean = String(value).replace(',', '.');
    match.betAmount = clean === '' ? '' : Math.max(0, Number(clean));
    if(!Number.isFinite(match.betAmount)) match.betAmount = '';
  }else{
    match[field] = value;
  }
  saveState();
}
function betResultHTML(match){
  const res = getBetPayout(match);
  if(res.status==='none') return '';
  if(res.status==='pending') return `<div class="betResult pendingText">Pari en attente</div>`;
  if(res.status==='win') return `<div class="betResult winText">Gain : ${res.payout.toFixed(2)} € · Profit : +${res.profit.toFixed(2)} €</div>`;
  return `<div class="betResult loseText">Perte : ${Math.abs(res.profit).toFixed(2)} €</div>`;
}

function getDisplayMatchCode(match){
  if(match.stage==='Phase de groupes') return '';
  const stageMap = {'Seizièmes de finale':['R32',72],'Huitièmes de finale':['R16',88],'Quarts de finale':['QF',96],'Demi-finales':['SF',100],'Match pour la 3e place':['TP',102],'Finale':['F',103]};
  const conf = stageMap[match.stage];
  if(!conf) return '';
  const [prefix, base] = conf;
  if(prefix==='TP' || prefix==='F') return 'M' + (base + 1);
  const m = String(match.id || '').match(new RegExp('^' + prefix + '-(\\d+)$'));
  return m ? 'M' + (base + Number(m[1])) : '';
}

      setBankroll(e.target.value);
      render();
    });
  }

  document.querySelectorAll('[data-bet-field]').forEach(el=>{
    el.addEventListener('change', e=>{
      const y = window.scrollY;
      setBet(e.target.dataset.id, e.target.dataset.betField, e.target.value);
      render();
      requestAnimationFrame(()=>window.scrollTo(0,y));
    });
  });
}

function render(){
  const active=document.querySelector('.tab.active')?.dataset.tab || 'groups';
  renderTabs(); renderGroups(); renderCalendar(); renderProba(); renderBets();
  const btn=document.querySelector(`.tab[data-tab="${active}"]`); if(btn) btn.click();
}
render();
</script>
</body>
</html>
