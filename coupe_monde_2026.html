<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Coupe du Monde 2026</title>
<meta name="theme-color" content="#0d2b1e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CM 2026" />
<style>
:root{
  --bg:#07150f; --bg2:#0d2b1e; --bg3:#123726;
  --card:rgba(255,255,255,.08); --text:#eefaf2; --muted:#b7d2c1;
  --accent:#8ee27a; --accent2:#39c46a; --gold:#ffd166;
  --shadow:0 18px 40px rgba(0,0,0,.30); --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;padding:0;
  background:
    radial-gradient(circle at top left,#1a4b34 0%, #0d2b1e 28%, #07150f 72%, #041008 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
}
body{min-height:100vh;padding:14px 12px 26px}
.app{max-width:1240px;margin:0 auto}
.hero{
  position:sticky;top:0;z-index:20;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  background:linear-gradient(180deg,rgba(7,21,15,.96),rgba(7,21,15,.86));
  padding:2px 0 12px;
}
.heroCard{
  background:linear-gradient(135deg,rgba(142,226,122,.18),rgba(57,196,106,.14));
  border:1px solid rgba(255,255,255,.10); border-radius:28px; padding:18px 16px; box-shadow:var(--shadow);
}
.heroTop{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:flex-start}
h1{margin:0 0 6px;font-size:clamp(30px,6vw,54px);line-height:.95;letter-spacing:-.03em}
.heroSub{margin:0;color:var(--muted);font-size:14px;max-width:820px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--text);font-size:12px;border:1px solid rgba(255,255,255,.08)}
.tabs{display:flex;gap:8px;overflow:auto;padding:14px 0 4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;background:rgba(255,255,255,.07);color:var(--muted);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px 16px;font:inherit;font-weight:700;cursor:pointer}
.tab.active{background:linear-gradient(135deg,rgba(142,226,122,.20),rgba(57,196,106,.20));color:var(--text);border-color:rgba(142,226,122,.35)}
.section{display:none}.section.active{display:block}
.panel{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.10);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-top:16px}
.panelHeader{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.panel h2,.panel h3{margin:0;letter-spacing:-.03em}
.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;color:var(--muted)}
.small{font-size:12px;color:var(--muted)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap}
.btn{appearance:none;border:none;border-radius:12px;padding:10px 12px;font:inherit;font-weight:700;cursor:pointer}
.btn.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.10)}
.quickGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.infoCard,.probaCard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px}
.qualLine{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.qualLine:last-child{border-bottom:none;padding-bottom:0}
.groupsGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.groupCard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:14px}
.groupHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.groupLetter{font-size:22px;font-weight:800}
.tableWrap{overflow:auto}
.standings{width:100%;border-collapse:collapse;font-size:13px}
.standings th,.standings td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.07);text-align:right}
.standings th:first-child,.standings td:first-child{text-align:left}
.standings tr:last-child td{border-bottom:none}
.calendarStage{margin-top:18px}.calendarStage:first-child{margin-top:0}
.stageTitle{font-size:18px;font-weight:800;margin:0 0 10px;letter-spacing:-.03em}
.matchesCompact{display:grid;gap:8px}
.matchCard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 12px}
.matchTop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:8px;font-size:12px;color:var(--muted)}
.matchMain{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
.teamCol{display:grid;gap:6px}
.teamCol.home{text-align:right}.teamCol.away{text-align:left}
.team{font-weight:800;font-size:15px;line-height:1.2}
.odds{font-size:12px;color:var(--muted)}
.scoreWrap{display:flex;align-items:center;gap:6px;justify-content:center}
.scoreInput,.dateInput,.timeInput{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;color:var(--text);padding:8px 6px;font:inherit;
}
.scoreInput{
  width:52px;text-align:center;font-weight:800;appearance:textfield;
}
.scoreInput::-webkit-outer-spin-button,.scoreInput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.dateTools{display:grid;grid-template-columns:1fr 90px;gap:6px;min-width:250px}
.dateInput{width:100%}
.timeInput{width:100%}
.vs{display:flex;align-items:center;justify-content:center;min-width:42px;padding:6px 10px;border-radius:11px;background:linear-gradient(135deg,rgba(142,226,122,.15),rgba(57,196,106,.15));border:1px solid rgba(255,255,255,.10);font-weight:800;font-size:12px}
.venue{margin-top:8px;color:var(--muted);font-size:12px}
.rank{width:28px;height:28px;border-radius:999px;display:grid;place-items:center;background:rgba(255,209,102,.18);color:#ffe7a6;font-size:12px;font-weight:800}
.probaGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.probaTop{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}
.probaTeam{font-weight:800;font-size:18px}.probaPct{font-weight:800}
.bar{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}
.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--accent))}
.note{font-size:12px;color:var(--muted);margin-top:12px}
@media (max-width:1080px){.groupsGrid,.probaGrid,.quickGrid{grid-template-columns:1fr}}
@media (max-width:720px){
  body{padding:12px 10px 22px}.heroCard{padding:16px 14px}.groupsGrid,.probaGrid,.quickGrid{grid-template-columns:1fr}
  .matchMain{grid-template-columns:1fr}.teamCol.home,.teamCol.away{text-align:center}.scoreWrap{margin:2px auto}.matchTop{justify-content:flex-start}
  .dateTools{grid-template-columns:1fr 96px;width:100%}
}
</style>
</head>

function phaseLabel(phase){
  return phase;
}

function buildMatchesFromRaw(){
  return RAW_MATCHES.map(row=>({
    id:`M${row.match}`,
    stage:phaseLabel(row.phase),
    group: row.phase==='Phase de groupes' ? inferGroup(row.equipe_1, row.equipe_2) : '',
    home: row.equipe_1,
    away: row.equipe_2,
    date: `${row.date}T${row.heure_france}`,
    venue: '',
    homeScore:'',
    awayScore:''
  }));
}

function inferGroup(a,b){
  for(const [letter, teams] of Object.entries(GROUPS)){
    if(teams.includes(a) || teams.includes(b)) return letter;
  }
  return '';
}

function initState(){
  return {odds:clone(INITIAL_ODDS),matches:buildMatchesFromRaw()};
}

let state=loadState();

function computePredictedTables(){
  const tables={};
  Object.entries(GROUPS).forEach(([letter,teams])=>{
    tables[letter]=[...teams]
      .sort((a,b)=>(TEAM_STRENGTH[b]||0)-(TEAM_STRENGTH[a]||0)||(state.odds[a]||999)-(state.odds[b]||999))
      .map((team,idx)=>({
        team,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0
      }));
  });
  return tables;
}

function computeTables(){
  const tables=computePredictedTables();
  const played=state.matches.filter(m=>m.stage==='Phase de groupes'&&m.group&&m.homeScore!==''&&m.awayScore!=='');

  played.forEach(match=>{
    const table=tables[match.group];
    const home=table.find(r=>r.team===match.home);
    const away=table.find(r=>r.team===match.away);
    if(!home || !away) return;
    const hs=Number(match.homeScore), as=Number(match.awayScore);

    home.p++; away.p++;
    home.gf+=hs; home.ga+=as;
    away.gf+=as; away.ga+=hs;

    if(hs>as){home.w++; away.l++; home.pts+=3;}
    else if(as>hs){away.w++; home.l++; away.pts+=3;}
    else {home.d++; away.d++; home.pts++; away.pts++;}

    home.gd=home.gf-home.ga;
    away.gd=away.gf-away.ga;
  });

  Object.values(tables).forEach(table=>{
    table.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||(TEAM_STRENGTH[b.team]||0)-(TEAM_STRENGTH[a.team]||0)||a.team.localeCompare(b.team));
  });

  return tables;
}

function bestThirds(tables){
  return Object.entries(tables).map(([group,rows])=>({group,...rows[2]}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||(TEAM_STRENGTH[b.team]||0)-(TEAM_STRENGTH[a.team]||0)||a.team.localeCompare(b.team));
}

function tokenToTeam(token, tables){
  if(!token) return token;
  const t = token.trim();

  const mWin = t.match(/^Vainqueur M(\d+)$/i);
  if(mWin){
    const match=getMatch(`M${mWin[1]}`);
    return probableWinner(match);
  }

  const mLose = t.match(/^Perdant M(\d+)$/i);
  if(mLose){
    const match=getMatch(`M${mLose[1]}`);
    return probableLoser(match);
  }

  const first = t.match(/^1er groupe ([A-L])$/i);
  if(first) return tables[first[1].toUpperCase()][0]?.team || t;

  const second = t.match(/^2e groupe ([A-L])$/i);
  if(second) return tables[second[1].toUpperCase()][1]?.team || t;

  if(/^Meilleur 3e$/i.test(t)){
    return bestThirds(tables)[0]?.team || t;
  }

  return t;
}

function probableWinner(match){
  if(!match) return 'À déterminer';
  const home = match.home, away = match.away;
  if(match.homeScore!==''&&match.awayScore!==''){
    return Number(match.homeScore)>Number(match.awayScore)?home:away;
  }
  const homeRank=(TEAM_STRENGTH[home]||0) - (state.odds[home]||999)/20;
  const awayRank=(TEAM_STRENGTH[away]||0) - (state.odds[away]||999)/20;
  return homeRank>=awayRank ? home : away;
}
function probableLoser(match){
  if(!match) return 'À déterminer';
  if(match.homeScore!==''&&match.awayScore!==''){
    return Number(match.homeScore)<Number(match.awayScore)?match.home:match.away;
  }
  return probableWinner(match)===match.home ? match.away : match.home;
}

function resolveKnockoutLabels(){
  const tables=computeTables();
  state.matches.filter(m=>m.stage!=='Phase de groupes').forEach(match=>{
    match.home = tokenToTeam(match.home, tables);
    match.away = tokenToTeam(match.away, tables);
  });
}

function setScore(id, side, value){
  const match=getMatch(id);
  if(value===''){ match[side]=''; }
  else{
    const n=parseInt(value,10);
    match[side]=Number.isNaN(n)?'':Math.max(0,n);
  }
  saveState();
}

function setDatePart(id, part, value){
  const match=getMatch(id);
  const current=splitDateTime(match.date);
  const nextDate = part==='date' ? value : current.date;
  const nextTime = part==='time' ? value : current.time;

  if(part==='date' && !isValidDateString(value)) return false;
  if(part==='time' && !isValidTimeString(value)) return false;

  match.date = mergeDateTime(nextDate, nextTime);
  saveState();
  return true;
}

function renderTabs(){
  const tabs=document.getElementById('tabs');
  tabs.innerHTML=TABS.map((t,i)=>`<button class="tab ${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');
  tabs.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
      document.getElementById(btn.dataset.tab).classList.add('active');
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

                <thead><tr><th>Équipe</th><th>Pts</th><th>J</th><th>Diff</th><th>BP</th></tr></thead>
                <tbody>${tables[letter].map((row,idx)=>`<tr><td>${idx+1}. ${row.team}</td><td>${row.pts}</td><td>${row.p}</td><td>${row.gd}</td><td>${row.gf}</td></tr>`).join('')}</tbody>
              </table>

function matchHTML(match){
  const dt=splitDateTime(match.date);
  return `<div class="matchCard">
    <div class="matchTop">
      <span class="dateLabel" data-label-id="${match.id}">${match.stage}${match.group ? ' · Groupe ' + match.group : ''} · ${formatDate(match.date)}</span>
      <div class="dateTools">
        <input class="dateInput" type="text" placeholder="YYYY-MM-DD" value="${dt.date}" data-id="${match.id}" data-part="date" />
        <input class="timeInput" type="text" placeholder="HH:MM" value="${dt.time}" data-id="${match.id}" data-part="time" />
      </div>
    </div>
    <div class="matchMain">
      <div class="teamCol home">
        <div class="team">${match.home}</div>
        <div class="odds">Cote : ${teamOdds(match.home)}</div>
      </div>
      <div class="scoreWrap">
        <input class="scoreInput" inputmode="numeric" pattern="[0-9]*" type="text" value="${match.homeScore}" data-id="${match.id}" data-side="homeScore" />
        <div class="vs">VS</div>
        <input class="scoreInput" inputmode="numeric" pattern="[0-9]*" type="text" value="${match.awayScore}" data-id="${match.id}" data-side="awayScore" />
      </div>
      <div class="teamCol away">
        <div class="team">${match.away}</div>
        <div class="odds">Cote : ${teamOdds(match.away)}</div>
      </div>
    </div>
    <div class="venue">${match.venue || ''}</div>
  </div>`;
}

function bindCalendarInputs(){
  document.querySelectorAll('.scoreInput').forEach(input=>{
    input.addEventListener('input', e=>{
      e.target.value=e.target.value.replace(/[^0-9]/g,'');
    });
    input.addEventListener('change', e=>{
      const clean=e.target.value.replace(/[^0-9]/g,'');
      const y=window.scrollY;
      setScore(e.target.dataset.id, e.target.dataset.side, clean);
      render();
      requestAnimationFrame(()=>window.scrollTo(0,y));
    });
    input.addEventListener('blur', e=>{
      const clean=e.target.value.replace(/[^0-9]/g,'');
      const y=window.scrollY;
      setScore(e.target.dataset.id, e.target.dataset.side, clean);
      render();
      requestAnimationFrame(()=>window.scrollTo(0,y));
    });
  });

  document.querySelectorAll('.dateInput, .timeInput').forEach(input=>{
    input.addEventListener('blur', e=>{
      const val=e.target.value.trim();
      const ok=setDatePart(e.target.dataset.id, e.target.dataset.part, val);
      if(ok){
        const match=getMatch(e.target.dataset.id);
        const label=document.querySelector(`.dateLabel[data-label-id="${e.target.dataset.id}"]`);
        if(label){
          label.textContent=`${match.stage}${match.group ? ' · Groupe ' + match.group : ''} · ${formatDate(match.date)}`;
        }
      }
    });
  });
}

function renderCalendar(){
  const stages=['Phase de groupes','Seizièmes de finale','Huitièmes de finale','Quarts de finale','Demi-finales','Match pour la 3e place','Finale'];
  document.getElementById('calendar').innerHTML=`
    <div class="panel">
      <div class="panelHeader"><h2>Calendrier</h2><span class="badge">${state.matches.length} matchs</span></div>
      ${stages.map(stage=>`<div class="calendarStage"><h3 class="stageTitle">${stage}</h3><div class="matchesCompact">${state.matches.filter(m=>m.stage===stage).map(matchHTML).join('')}</div></div>`).join('')}
    </div>`;
  bindCalendarInputs();
}

function renderProba(){
  const list=allTeams().map(team=>({team,pct:Math.max(1,Math.round((100/(state.odds[team]||200))*10)/10)})).sort((a,b)=>b.pct-a.pct);
  document.getElementById('proba').innerHTML=`
    <div class="panel">
      <div class="panelHeader"><h2>Probabilités</h2><span class="badge">Basées sur les cotes</span></div>
      <div class="probaGrid">
        ${list.map((item,index)=>`<div class="probaCard"><div class="probaTop"><div style="display:flex;align-items:center;gap:10px"><div class="rank">${index+1}</div><div class="probaTeam">${item.team}</div></div><div class="probaPct">${item.pct}%</div></div><div class="small">Estimation simple à partir de la cote enregistrée</div><div class="bar"><span style="width:${Math.min(item.pct*4,100)}%"></span></div></div>`).join('')}
      </div>
      <div class="note">L’équipe Italie a été ajoutée car elle figure dans les données que tu as fournies.</div>
    </div>`;
}

function render(){
  const active=document.querySelector('.tab.active')?.dataset.tab || 'groups';
  resolveKnockoutLabels();
  renderTabs();
  renderGroups();
  renderCalendar();
  renderProba();
  const btn=document.querySelector(`.tab[data-tab="${active}"]`);
  if(btn) btn.click();
}

render();
