<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CDM 2026">
<meta name="theme-color" content="#060d1a">
<title>CDM 2026 · Grille</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060d1a;--bg2:#0c1526;--bg3:#111d32;--card:#0f1c2e;
  --border:rgba(255,255,255,0.07);--gold:#f0a500;
  --green:#2ecc71;--red:#e74c3c;--amber:#f39c12;
  --text:#e8edf5;--muted:#5a6a80;
  --s1:#3b82f6;--s2:#f59e0b;--s3:#a78bfa;
}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
header{position:sticky;top:0;z-index:100;background:rgba(6,13,26,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(240,165,0,0.2);padding:12px 16px 10px}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:2px;color:var(--gold)}
.header-sub{font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:2px}
.hright{text-align:right;font-size:9px;color:var(--muted);line-height:1.7}
.hright b{color:var(--text)}

/* SCENARIO GLOBAL */
.scen-bar{display:flex;gap:6px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
.scen-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid transparent;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;background:rgba(255,255,255,0.04);color:var(--muted);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.scen-btn .sicon{font-size:16px}
.scen-btn .slabel{font-size:9px;letter-spacing:1px}
.scen-btn .sprob{font-size:8px;opacity:.7}
.scen-btn.s1.active{background:rgba(59,130,246,0.15);border-color:var(--s1);color:var(--s1)}
.scen-btn.s2.active{background:rgba(245,158,11,0.15);border-color:var(--s2);color:var(--s2)}
.scen-btn.s3.active{background:rgba(167,139,250,0.15);border-color:var(--s3);color:var(--s3)}

/* TABS */
.group-tabs{display:flex;gap:5px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--bg2)}
.group-tabs::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:5px 10px;border-radius:20px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.gtab.active{background:var(--gold);color:#000;border-color:var(--gold)}

main{padding:10px 12px 80px}

/* GROUPE */
.groupe{margin-bottom:18px}
.groupe-header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:linear-gradient(135deg,rgba(240,165,0,0.1),rgba(240,165,0,0.03));border:1px solid rgba(240,165,0,0.18);border-radius:12px 12px 0 0;margin-bottom:1px}
.groupe-letter{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:var(--gold);line-height:1;min-width:24px}

/* CLASSEMENT */
.classement{background:var(--bg3);border:1px solid var(--border);border-top:none;padding:7px 10px;margin-bottom:1px}
.clas-row{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:5px;margin-bottom:2px}
.clas-row.qual{background:rgba(46,204,113,0.07)}
.clas-pos{font-size:9px;color:var(--muted);width:12px;text-align:center}
.clas-flag{width:18px;height:13px;border-radius:2px;object-fit:cover;flex-shrink:0}
.clas-flag-ph{width:18px;height:13px;border-radius:2px;background:rgba(255,255,255,0.05);flex-shrink:0;display:inline-block}
.clas-nom{flex:1;font-size:10px;font-weight:600}
.clas-nom.qual{color:#86efac}
.clas-pts{font-size:10px;font-weight:700;color:var(--gold);min-width:28px;text-align:right}
.clas-diff{font-size:9px;color:var(--muted);min-width:22px;text-align:right}

/* MATCHS */
.matchs-block{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.match-card{padding:11px 12px;border-bottom:1px solid var(--border)}
.match-card:last-child{border-bottom:none}

/* SCENARIO PAR MATCH */
.match-scen-row{display:flex;gap:4px;margin-bottom:8px}
.msb{flex:1;padding:4px 2px;border-radius:7px;border:1.5px solid transparent;background:rgba(255,255,255,0.03);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:1px}
.msb .mscore{font-size:13px;font-weight:800;letter-spacing:1px}
.msb .mlabel{font-size:7px;letter-spacing:.5px;opacity:.8}
.msb.s1{border-color:rgba(59,130,246,0.25)}
.msb.s2{border-color:rgba(245,158,11,0.25)}
.msb.s3{border-color:rgba(167,139,250,0.25)}
.msb.s1.active{background:rgba(59,130,246,0.15);border-color:var(--s1);color:var(--s1)}
.msb.s2.active{background:rgba(245,158,11,0.15);border-color:var(--s2);color:var(--s2)}
.msb.s3.active{background:rgba(167,139,250,0.15);border-color:var(--s3);color:var(--s3)}

/* ÉQUIPES */
.match-teams{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.team-info{flex:1}
.team-row{display:flex;align-items:center;gap:4px}
.team-row.right{flex-direction:row-reverse}
.team-flag{width:20px;height:14px;border-radius:2px;object-fit:cover;flex-shrink:0}
.team-name{font-size:11px;font-weight:700;color:var(--text);font-family:'Barlow Condensed',sans-serif}
.team-meta{font-size:8px;color:var(--muted);margin-top:2px;line-height:1.5}
.team-meta.right{text-align:right}
.forme{display:flex;gap:2px;margin-top:2px}
.forme.right{justify-content:flex-end}
.fp{width:12px;height:12px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:#fff;flex-shrink:0}
.fp.V{background:var(--green)}.fp.N{background:var(--amber)}.fp.D{background:var(--red)}

/* SCORE SAISI */
.score-box{display:flex;align-items:center;gap:4px;flex-shrink:0}
.score-input{width:34px;height:34px;border-radius:7px;border:2px solid rgba(240,165,0,0.3);background:rgba(240,165,0,0.08);color:var(--text);font-size:17px;font-weight:800;text-align:center;outline:none;font-family:'Barlow Condensed',sans-serif;-webkit-appearance:none}
.score-input:focus{border-color:var(--gold)}
.score-sep{color:var(--muted);font-size:16px;font-weight:700}

/* H2H */
.h2h{display:flex;flex-wrap:wrap;gap:3px;padding-top:6px;border-top:1px solid var(--border);align-items:center}
.h2h-label{font-size:7px;color:var(--muted);letter-spacing:1px;margin-right:2px}
.h2h-item{font-size:7px;padding:2px 6px;border-radius:20px;background:rgba(255,255,255,0.05);color:#8a9ab0}
.h2h-item b{color:var(--text)}
.h2h-item .win{color:#86efac}
.h2h-none{font-size:7px;color:var(--muted);font-style:italic}

/* NAV BAS */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,13,26,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;transition:color .2s}
.bnav-btn.active{color:var(--gold)}
.bnav-icon{font-size:18px;line-height:1}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:18px 16px max(18px,env(safe-area-inset-bottom))}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;color:var(--gold);letter-spacing:2px;margin-bottom:12px}
.resume-section{margin-bottom:14px}
.resume-stitle{font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:7px;font-family:'Barlow Condensed',sans-serif}
.resume-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)}
.resume-row:last-child{border-bottom:none}
.legend-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:9px;color:var(--muted);line-height:1.9}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}

input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
/* AGENDA */
.agenda-day{margin-bottom:18px}
.agenda-day-header{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;color:var(--gold);padding:6px 0 6px;border-bottom:1px solid rgba(240,165,0,0.2);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.agenda-day-header .day-badge{background:rgba(240,165,0,0.12);padding:2px 8px;border-radius:20px;font-size:10px}
.agenda-match{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;margin-bottom:5px;cursor:pointer;transition:background .15s}
.agenda-match:active{background:rgba(255,255,255,0.07)}
.agenda-match.scored{border-color:rgba(26,124,250,0.3);background:rgba(26,124,250,0.05)}
.agenda-match.live{border-color:rgba(231,76,60,0.5);background:rgba(231,76,60,0.05)}
.agenda-time{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;color:var(--gold);min-width:38px;text-align:center;flex-shrink:0}
.agenda-time.late{color:var(--muted)}
.agenda-grp{font-size:8px;color:var(--muted);background:rgba(255,255,255,0.05);padding:1px 5px;border-radius:10px;flex-shrink:0}
.agenda-teams{flex:1;display:flex;align-items:center;gap:4px;min-width:0}
.agenda-team{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
.agenda-team.right{flex-direction:row-reverse}
.agenda-tname{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:"Barlow Condensed",sans-serif}
.agenda-score{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:3px;flex-shrink:0}
.agenda-score.pred{color:var(--pred)}
.agenda-score .sc{min-width:16px;text-align:center}
.agenda-score .sep{color:var(--muted);font-size:12px}
.agenda-cote{font-size:8px;color:var(--muted);flex-shrink:0}
.today-marker{font-size:9px;color:var(--red);letter-spacing:1px;font-family:"Barlow Condensed",sans-serif}

/* AJUST MODAL */
.ajust-team-block{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.ajust-team-block:last-child{border-bottom:none;margin-bottom:0}
.ajust-team-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ajust-team-name{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.ajust-score{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;margin-left:auto}
.ajust-score.pos{background:rgba(46,204,113,0.15);color:#86efac}
.ajust-score.neg{background:rgba(231,76,60,0.15);color:#f87171}
.ajust-score.neu{background:rgba(255,255,255,0.06);color:var(--muted)}
.criterion-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.crit-label{font-size:9px;color:var(--muted);width:68px;flex-shrink:0;line-height:1.3}
.crit-label b{display:block;color:var(--text);font-size:10px}
.crit-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer}
.crit-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer}
.crit-val{font-size:10px;font-weight:700;min-width:36px;text-align:right;font-family:"Barlow Condensed",sans-serif}
.crit-val.pos{color:#86efac}.crit-val.neg{color:#f87171}.crit-val.neu{color:var(--muted)}
.ajust-reset-btn{font-size:9px;color:var(--muted);background:none;border:1px solid var(--border);padding:3px 8px;border-radius:12px;cursor:pointer;margin-top:4px}
.ajust-search{width:100%;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;outline:none;margin-bottom:12px;font-family:"Barlow",sans-serif}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="header-title">&#127942; CDM 2026</div>
      <div class="header-sub">PHASE DE GROUPES</div>
    </div>
    <div class="hright">
      <div>Saisis&nbsp;<b id="cS">0</b> &middot; Préd.&nbsp;<b id="cP">72</b></div>
      <div style="font-size:8px">11&ndash;27 juin 2026</div>
    </div>
  </div>
</header>

<!-- BARRE SCÉNARIO GLOBAL -->
<div class="scen-bar">
  <button class="scen-btn s1 active" id="gb1" onclick="setGlobalScen(1)">
    <div class="sicon">&#127775;</div>
    <div class="slabel">FAVORI</div>
    <div class="sprob">~50%</div>
  </button>
  <button class="scen-btn s2" id="gb2" onclick="setGlobalScen(2)">
    <div class="sicon">&#9878;</div>
    <div class="slabel">SERRÉ</div>
    <div class="sprob">~35%</div>
  </button>
  <button class="scen-btn s3" id="gb3" onclick="setGlobalScen(3)">
    <div class="sicon">&#128165;</div>
    <div class="slabel">SURPRISE</div>
    <div class="sprob">~15%</div>
  </button>
</div>

<!-- Bannière installation iOS -->
<div id="installBanner" style="display:none;align-items:center;gap:10px;padding:9px 14px;background:linear-gradient(135deg,rgba(240,165,0,0.12),rgba(240,165,0,0.04));border-bottom:1px solid rgba(240,165,0,0.2);font-size:10px;color:var(--text)">
  <div style="font-size:22px;flex-shrink:0">&#11014;</div>
  <div style="flex:1;line-height:1.6">
    <b style="color:var(--gold)">Installer sur l'écran d'accueil</b><br>
    <span style="color:var(--muted)">Appuyez sur <b style="color:var(--text)">Partager</b> &#10064; puis <b style="color:var(--text)">Sur l'écran d'accueil</b></span>
  </div>
  <button onclick="document.getElementById('installBanner').style.display='none';localStorage.setItem('cdm_banner_dismissed','1')" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;line-height:1">&#215;</button>
</div>

<div class="group-tabs" id="groupTabs"></div>
<main id="main"></main>

<div class="bottom-nav">
  <button class="bnav-btn active" id="btnGrille" onclick="showView('grille')"><div class="bnav-icon">&#9783;</div>GRILLE</button>
  <button class="bnav-btn" id="btnResume" onclick="showView('resume')"><div class="bnav-icon">&#128202;</div>RÉSUMÉ</button>
  <button class="bnav-btn" id="btnAgenda" onclick="showView('agenda')"><div class="bnav-icon">&#128197;</div>AGENDA</button>
  <button class="bnav-btn" id="btnAjust" onclick="openAjust()"><div class="bnav-icon">&#9881;</div>AJUST.</button>
  <button class="bnav-btn" id="btnReset" onclick="confirmReset()"><div class="bnav-icon">&#8635;</div>RESET</button>
</div>

<!-- MODAL AGENDA -->
<div class="modal-overlay" id="agendaModal" onclick="closeAgenda()">
  <div class="modal" onclick="event.stopPropagation()" style="max-height:92vh">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="modal-title" style="margin-bottom:0">&#128197; AGENDA</div>
      <div style="display:flex;gap:6px">
        <button onclick="agendaFilter='all';renderAgenda()" id="af-all" style="font-size:9px;padding:4px 8px;border-radius:12px;border:1px solid rgba(240,165,0,0.4);background:rgba(240,165,0,0.15);color:var(--gold);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700">TOUS</button>
        <button onclick="agendaFilter='soon';renderAgenda()" id="af-soon" style="font-size:9px;padding:4px 8px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700">À VENIR</button>
      </div>
    </div>
    <div id="agendaContent"></div>
  </div>
</div>

<!-- MODAL AJUSTEMENTS QUALITATIFS -->
<div class="modal-overlay" id="ajustModal" onclick="closeAjust()">
  <div class="modal" onclick="event.stopPropagation()" id="ajustContent">
  </div>
</div>

<div class="modal-overlay" id="resumeModal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">RÉSUMÉ</div>
    <div id="resumeContent"></div>
  </div>
</div>

<script>
// ── DONNÉES ──────────────────────────────────────────────────────────────────

const FIFA_RANK = {
  FRA:1,ESP:2,ARG:3,ENG:4,POR:5,BRA:6,NED:7,MAR:8,BEL:9,GER:10,
  CRO:11,COL:13,SEN:14,MEX:15,USA:16,URU:17,JPN:18,SUI:19,
  IRN:21,TUR:22,ECU:23,AUT:24,KOR:25,AUS:27,ALG:28,EGY:29,
  CAN:30,NOR:31,PAN:33,CIV:34,SWE:38,PAR:40,CZE:41,SCO:43,
  TUN:44,COD:46,UZB:50,QAT:55,CPV:62,KSA:56,IRQ:70,JOR:72,
  CUW:85,BIH:68,RSA:65,HAI:90,NZL:110,GHA:60
};

const COTES = {
  ESP:5.5,FRA:6,ENG:7,BRA:9,ARG:9,POR:11,GER:13,NED:20,
  NOR:25,BEL:30,USA:40,COL:50,MAR:50,SUI:50,JPN:60,
  MEX:75,URU:75,CAN:100,CRO:100,ECU:100,SEN:100,TUR:100,
  AUT:150,PAR:150,SWE:150,ALG:250,BIH:250,CIV:250,SCO:250,
  EGY:250,CZE:250,AUS:500,KOR:500,GHA:500,IRN:500,COD:500,TUN:500,
  RSA:1000,KSA:1000,CPV:1000,CUW:1000,HAI:1000,IRQ:1000,JOR:1000,
  NZL:1000,UZB:1000,PAN:1000,QAT:1000
};

// Bonus équipe hôte (fixe)
const HOST_BONUS = {MEX:0.05, USA:0.05, CAN:0.05};

// ── BONUS/MALUS QUALITATIFS ───────────────────────────────────────────────────
// 4 critères par équipe, valeurs entre -0.20 et +0.20
// star=effet star individuel, deuil=choc émotionnel, effectif=qualité réelle, psycho=mentalité grands matchs
const DEFAULT_QUALIT = {
  POR:{ star:0.08,  deuil:-0.04, effectif:0.10,  psycho:0.05  },
  FRA:{ star:0.05,  deuil:0,     effectif:0.08,  psycho:0.03  },
  ESP:{ star:0,     deuil:0,     effectif:0.08,  psycho:0.05  },
  ARG:{ star:0.05,  deuil:0,     effectif:0.05,  psycho:0.08  },
  ENG:{ star:0.03,  deuil:0,     effectif:0.05,  psycho:-0.03 },
  BRA:{ star:0,     deuil:0,     effectif:0.03,  psycho:0     },
  GER:{ star:0,     deuil:0,     effectif:0.05,  psycho:0.03  },
  NED:{ star:0,     deuil:0,     effectif:0.03,  psycho:0     },
  MAR:{ star:0,     deuil:0,     effectif:0.05,  psycho:0.05  },

// ── FORMULE PRÉDICTIVE ────────────────────────────────────────────────────────

function forceScore(code) {
  const rank = FIFA_RANK[code] || 80;
  const cote = COTES[code] || 500;
  const forme = FORME[code] || [];
  const formePts = forme.reduce((s,r)=>s+(r==='V'?3:r==='N'?1:0),0);
  const rankScore = Math.max(0,(100-rank)/100);
  const coteScore = 1-Math.min(1,Math.log(cote)/Math.log(1000));
  const formeScore = formePts/15;
  const host = HOST_BONUS[code]||0;
  const qb = getQualitBonus(code);
  return 0.55*rankScore + 0.22*coteScore + 0.13*formeScore + host + qb;
}

// 3 scénarios : 1=favori domine, 2=serré, 3=surprise
function predictScore(codeA, codeB, scenario) {
  const fA = forceScore(codeA);
  const fB = forceScore(codeB);
  const diff = fA - fB;
  const absDiff = Math.abs(diff);
  const BASE = 1.2;

  let g1, g2;

  if (scenario === 1) {
    // Favori : différentiel plein, score net
    g1 = BASE + diff * 2.0;
    g2 = BASE - diff * 2.0;

  } else if (scenario === 2) {
    // Serré : différentiel réduit de 60%, biais vers faible écart
    const attenuated = diff * 0.4;
    g1 = BASE + attenuated * 1.5;
    g2 = BASE - attenuated * 1.5;
    // Forcer max 1 but d'écart sauf gros favoris
    if (absDiff < 0.35) { g1 = 1; g2 = 1; } // nul probable

  } else {
    // Surprise : favoris résistent à peine, outsider peut surprendre
    const inv = -diff * 0.3;
    g1 = BASE + inv * 1.2;
    g2 = BASE - inv * 1.2;
    // Si très fort favori : nul ou défaite minimale
    if (absDiff > 0.3) {
      const winner = diff > 0 ? 'B' : 'A';
      if (winner === 'B') { g1 = 0; g2 = 1; }
      else { g1 = 1; g2 = 0; }
    } else {
      g1 = 1; g2 = 1;
    }
  }

  g1 = Math.round(Math.max(0,Math.min(5,g1)));
  g2 = Math.round(Math.max(0,Math.min(5,g2)));
  const tot = g1+g2;
  if(tot>5){g1=Math.round(g1*5/tot);g2=Math.round(g2*5/tot);}
  return [g1,g2];
}

function buildPredictions(scen) {
  const p={};
  GROUPES.forEach(grp=>{
    matchups(grp.teams).forEach(([a,b])=>{
      const k=a+'|'+b;
      const [g1,g2]=predictScore(a,b,scen);
      p[k]={s1:g1,s2:g2};
    });
  });
  return p;
}

function getEffectiveScen(k){ return matchScen[k]||globalScen; }

function getScore(k){
  const us=userScores[k];
  if(us&&us.s1!=null&&us.s2!=null) return {s:us,isPred:false};
  const scen=getEffectiveScen(k);
  return {s:predictions[scen][k],isPred:true,scen};
}

function matchups(teams){
  const r=[];
  for(let i=0;i<teams.length;i++)
    for(let j=i+1;j<teams.length;j++)
      r.push([teams[i],teams[j]]);
  return r;
}

function classement(groupe){
  const ms=matchups(groupe.teams);
  return groupe.teams.map(eq=>{
    let pts=0,bp=0,bc=0,j=0;
    ms.forEach(([a,b])=>{
      const k=a+'|'+b;
      const {s}=getScore(k);
      if(!s||s.s1==null||s.s2==null) return;
      const g1=+s.s1,g2=+s.s2;
      if(eq===a){j++;bp+=g1;bc+=g2;pts+=g1>g2?3:g1===g2?1:0;}
      if(eq===b){j++;bp+=g2;bc+=g1;pts+=g2>g1?3:g1===g2?1:0;}
    });
    return {eq,pts,diff:bp-bc,bp,j};
  }).sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.bp-a.bp);
}

function renderClassement(groupe){
  var cl=classement(groupe);
  var html='<div class="classement" id="classe-'+groupe.g+'">';
  for(var i=0;i<cl.length;i++){
    var row=cl[i];
    var q=i<2?' qual':'';
    html+='<div class="clas-row'+q+'">';
    html+='<div class="clas-pos">'+(i+1)+'</div>'+flagSm(row.eq);
    html+='<div class="clas-nom'+q+'">'+(NOM[row.eq]||row.eq)+'</div>';
    html+='<div class="clas-pts">'+(row.j>0?row.pts+'pts':'—')+'</div>';
    html+='<div class="clas-diff">'+(row.j>0?(row.diff>=0?'+':'')+row.diff:'')+'</div>';
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function renderGroupe(groupe){

  var matchHtml='';
  for(var j=0;j<ms.length;j++) matchHtml+=renderMatch(ms[j][0],ms[j][1]);

function setGlobalScen(s){
  globalScen=s;
  matchScen={}; // reset surcharges par match
  [1,2,3].forEach(i=>{
    document.getElementById('gb'+i).classList.toggle('active',i===s);
  });
  saveMatchScen();
  renderAll();
}

function setMatchScen(k,s){
  matchScen[k]=s;
  saveMatchScen();
  // Re-render juste le match
  const [t1,t2]=k.split('|');
  const card=document.getElementById(('mc-'+k.replace('|','-')));
  if(card){ card.outerHTML=renderMatch(t1,t2); }
  updateClassements();
  updateCounter();
}

function setScore(t1,t2,field,val){
  const k=t1+'|'+t2;
  if(!userScores[k]) userScores[k]={s1:null,s2:null};
  userScores[k][field]=val===''?null:+val;
  const both=userScores[k].s1!=null&&userScores[k].s2!=null;
  saveScores();
  const card=document.getElementById(('mc-'+k.replace('|','-')));
  if(card){ card.outerHTML=renderMatch(t1,t2); }
  updateClassements();
  updateCounter();
}

function updateClassements(){
  for(var gi=0;gi<GROUPES.length;gi++){
    var groupe=GROUPES[gi];
    var el=document.getElementById('classe-'+groupe.g);
    if(!el) continue;
    var cl=classement(groupe);
    var html='';
    for(var i=0;i<cl.length;i++){
      var row=cl[i]; var q=i<2?' qual':'';
      html+='<div class="clas-row'+q+'">';
      html+='<div class="clas-pos">'+(i+1)+'</div>'+flagSm(row.eq);
      html+='<div class="clas-nom'+q+'">'+(NOM[row.eq]||row.eq)+'</div>';
      html+='<div class="clas-pts">'+(row.j>0?row.pts+'pts':'—')+'</div>';
      html+='<div class="clas-diff">'+(row.j>0?(row.diff>=0?'+':'')+row.diff:'')+'</div>';
      html+='</div>';
    }
    el.innerHTML=html;
  }
}
function updateCounter(){
  let ns=0,np=0;
  GROUPES.forEach(g=>matchups(g.teams).forEach(([a,b])=>{
    const k=a+'|'+b;
    const us=userScores[k];
    if(us&&us.s1!=null&&us.s2!=null) ns++; else np++;
  }));
  document.getElementById('cS').textContent=ns;
  document.getElementById('cP').textContent=np;
}

function buildTabs(){
  var tabs=document.getElementById('groupTabs');
  var html='<button class="gtab'+(currentGroup==='all'?' active':'')+'" onclick="filterGroup(\'all\')">TOUS</button>';
  for(var i=0;i<GROUPES.length;i++){
    var g=GROUPES[i];
    html+='<button class="gtab'+(currentGroup===g.g?' active':'')+'" onclick="filterGroup(\''+g.g+'\')">GRP '+g.g+'</button>';
  }
  tabs.innerHTML=html;
}
function filterGroup(g){
  currentGroup=g;buildTabs();renderAll();window.scrollTo({top:0,behavior:'smooth'});
}

// Trier par date+heure
CALENDAR.sort((a,b)=>{
  const da=new Date(a[0]+'T'+a[1]+':00'), db=new Date(b[0]+'T'+b[1]+':00');
  return da-db;
});

let agendaFilter = 'all';
const TODAY = '2026-06-07';

function isLate(heure){ const h=parseInt(heure); return h>=0&&h<8; }
function isToday(date){ return date===TODAY; }
function isSoon(date){ return date>=TODAY; }

function renderAgenda(){
  var cont=document.getElementById('agendaContent');
  if(!cont) return;
  var matches=CALENDAR;
  if(agendaFilter==='soon') matches=CALENDAR.filter(function(m){return isSoon(m[0]);});
  var byDate={};
  for(var i=0;i<matches.length;i++){
    var m=matches[i]; var dt=m[0];
    if(!byDate[dt]) byDate[dt]=[];
    byDate[dt].push(m);
  }
  var JOURS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  var MOIS=['jan','fév','mars','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  var html='';
  var dates=Object.keys(byDate).sort();
  for(var di=0;di<dates.length;di++){
    var date=dates[di];
    var d=new Date(date+'T12:00:00');
    var dateStr=JOURS[d.getDay()]+' '+d.getDate()+' '+MOIS[d.getMonth()];
    var todayMark=isToday(date)?'<span class="today-marker">AUJOURD\'HUI</span>':'';
    html+='<div class="agenda-day">';
    html+='<div class="agenda-day-header"><span class="day-badge">'+dateStr+'</span>'+todayMark+'</div>';
    var dayMatches=byDate[date];
    for(var mi=0;mi<dayMatches.length;mi++){
      var mm=dayMatches[mi];
      var heure=mm[1]; var t1=mm[2]; var t2=mm[3]; var grp=mm[4];
      var k=t1+'|'+t2;
      var res=getScore(k); var s=res.s;
      var us2=userScores[k]||{};
      var isScored2=us2.s1!=null&&us2.s2!=null;
      var late=isLate(heure);
      var g1=s?s.s1:'?'; var g2=s?s.s2:'?';
      var iso1=ISO[t1]; var iso2=ISO[t2];
      var f1=iso1?'<img style="width:18px;height:13px;border-radius:2px;object-fit:cover;flex-shrink:0" src="https://flagcdn.com/24x18/'+iso1+'.png" alt="">':'';
      var f2=iso2?'<img style="width:18px;height:13px;border-radius:2px;object-fit:cover;flex-shrink:0" src="https://flagcdn.com/24x18/'+iso2+'.png" alt="">':'';
      var hcls=late?'agenda-time late':'agenda-time';
      var scls=isScored2?'agenda-score':'agenda-score pred';
      html+='<div class="agenda-match'+(isScored2?' scored':'')+'" onclick="filterGroup(\''+grp+'\');closeAgenda();scrollToMatch(\''+k+'\');">';
      html+='<div class="'+hcls+'">'+heure+'</div>';
      html+='<div class="agenda-grp">GRP '+grp+'</div>';
      html+='<div class="agenda-teams">';
      html+='<div class="agenda-team">'+f1+'<div class="agenda-tname">'+(NOM[t1]||t1)+'</div></div>';
      html+='<div class="'+scls+'"><span class="sc">'+g1+'</span><span class="sep">-</span><span class="sc">'+g2+'</span></div>';
      html+='<div class="agenda-team right">'+f2+'<div class="agenda-tname">'+(NOM[t2]||t2)+'</div></div>';
      html+='</div>';
      html+='<div class="agenda-cote">'+(COTES[t1]||'?')+'/'+( COTES[t2]||'?')+'</div>';
      html+='</div>';
    }
    html+='</div>';
  }
  cont.innerHTML=html||'<div style="color:var(--muted);font-size:11px;padding:20px;text-align:center">Aucun match</div>';
}
function scrollToMatch(k){
  setTimeout(()=>{
    const el=document.getElementById('mc-'+k.replace('|','-'));
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },300);
}

}

  document.getElementById('agendaModal').classList.remove('open');
  document.getElementById('btnAgenda').classList.remove('active');
}

const CRIT_META = {
  star:  { label:'Effet star',   desc:'Joueur(s) décisif(s)',   color:'#fbbf24', min:-0.10, max:0.15 },
  deuil: { label:'Choc émot.',   desc:'Blessure/deuil clé',     color:'#f87171', min:-0.15, max:0.05 },
  effectif:{ label:'Effectif',   desc:'Qualité réelle vs FIFA',  color:'#60a5fa', min:-0.10, max:0.15 },
  psycho:{ label:'Mentalité',    desc:'Grands tournois',         color:'#a78bfa', min:-0.10, max:0.12 },
};

// Équipes éditables (celles avec qualit défini + possibilité d'en ajouter)
const ALL_TEAMS = ["POR","FRA","ESP","ARG","ENG","BRA","GER","NED","MAR","COL",
  "NOR","SEN","TUR","JPN","USA","MEX","CAN","URU","SUI","CRO",
  "BEL","ECU","AUT","ALG","KOR","SWE","CZE","SCO","EGY","IRN",
  "AUS","TUN","GHA","RSA","HAI","QAT","CPV","KSA","IRQ","JOR","CUW","BIH","COD","UZB","PAN","NZL","PAR","CIV"];

function getTotalQualit(code){
  const q=qualit[code]||{star:0,deuil:0,effectif:0,psycho:0};
  return (q.star||0)+(q.deuil||0)+(q.effectif||0)+(q.psycho||0);
}

let ajustFilter = '';

function renderAjustContent(){
  var cont=document.getElementById('ajustContent');
  if(!cont) return;
  var teams=ALL_TEAMS.filter(function(t){
    return !ajustFilter||(NOM[t]||t).toLowerCase().indexOf(ajustFilter.toLowerCase())>=0;
  });
  var html='<div class="modal-handle"></div>';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html+='<div class="modal-title" style="margin-bottom:0">AJUSTEMENTS</div>';
  html+='<button onclick="resetAllQualit()" class="ajust-reset-btn">Reset tout</button></div>';
  html+='<div style="font-size:9px;color:var(--muted);margin-bottom:10px;line-height:1.6">Modifie le score de force. Prédictions recalculées en temps réel.</div>';
  html+='<input class="ajust-search" placeholder="Rechercher..." value="'+ajustFilter+'" oninput="ajustFilter=this.value;renderAjustContent()">';
  var critKeys=['star','deuil','effectif','psycho'];
  for(var ti=0;ti<teams.length;ti++){
    var code=teams[ti];
    var q=qualit[code]||{star:0,deuil:0,effectif:0,psycho:0};
    var total=getTotalQualit(code);
    var totStr=(total>0?'+':'')+total.toFixed(2);
    var totClass=total>0.01?'pos':total<-0.01?'neg':'neu';
    var iso=ISO[code];
    var flagHtml=iso?'<img style="width:20px;height:14px;border-radius:2px;object-fit:cover" src="https://flagcdn.com/24x18/'+iso+'.png" alt="">':'';
    html+='<div class="ajust-team-block">';
    html+='<div class="ajust-team-header">'+flagHtml;
    html+='<div class="ajust-team-name">'+(NOM[code]||code)+'</div>';
    html+='<div class="ajust-score '+totClass+'">Force '+totStr+'</div></div>';
    for(var ci=0;ci<critKeys.length;ci++){
      var key=critKeys[ci]; var meta=CRIT_META[key];
      var val=q[key]||0;
      var valStr=(val>0?'+':'')+val.toFixed(2);
      var valClass2=val>0.005?'pos':val<-0.005?'neg':'neu';
      var pct=((val-meta.min)/(meta.max-meta.min)*100).toFixed(0);
      var bgStyle='linear-gradient(to right,'+meta.color+' '+pct+'%,rgba(255,255,255,0.1) '+pct+'%)';
      html+='<div class="criterion-row">';
      html+='<div class="crit-label"><b>'+meta.label+'</b>'+meta.desc+'</div>';
      html+='<input type="range" class="crit-slider" min="'+meta.min+'" max="'+meta.max+'" step="0.01" value="'+val+'" style="background:'+bgStyle+'" oninput="updateQualit(''+code+'',''+key+'',+this.value,this)">';
      html+='<div class="crit-val '+valClass2+'" id="qv-'+code+'-'+key+'">'+valStr+'</div>';
      html+='</div>';
    }
    html+='</div>';
  }
  cont.innerHTML=html;
}
function updateQualit(code, key, val, slider){
  if(!qualit[code]) qualit[code]={star:0,deuil:0,effectif:0,psycho:0};
  qualit[code][key] = val;
  saveQualit();
  // Mettre à jour valeur affichée
  const el = document.getElementById('qv-'+code+'-'+key);
  if(el){ el.textContent=(val>0?'+':'')+val.toFixed(2); el.className='crit-val '+(val>0.005?'pos':val<-0.005?'neg':'neu'); }
  // Mettre à jour total
  const total=getTotalQualit(code);
  const totStr=(total>0?'+':'')+total.toFixed(2);
  // Recalculer prédictions et classements
  predictions={1:buildPredictions(1),2:buildPredictions(2),3:buildPredictions(3)};
  updateClassements();
  updateCounter();
  // Update slider gradient
  const meta=CRIT_META[key];
  const pct=((val-meta.min)/(meta.max-meta.min)*100).toFixed(0);
  slider.style.background='linear-gradient(to right,'+meta.color+' '+pct+'%,rgba(255,255,255,0.1) '+pct+'%)';
}

function resetAllQualit(){
  if(confirm('Remettre tous les ajustements aux valeurs par d\u00e9faut ?')){
    qualit=JSON.parse(JSON.stringify(DEFAULT_QUALIT));
    saveQualit();
    predictions={1:buildPredictions(1),2:buildPredictions(2),3:buildPredictions(3)};
    updateClassements();updateCounter();
    renderAjustContent();
  }
}

function openAjust(){
  ajustFilter='';
  renderAjustContent();
  document.getElementById('ajustModal').classList.add('open');
  document.getElementById('btnAjust').classList.add('active');
}
function closeAjust(){
  document.getElementById('ajustModal').classList.remove('open');
  document.getElementById('btnAjust').classList.remove('active');
  renderAll();
}

function confirmReset(){
  if(confirm('Effacer vos scores saisis et les scénarios par match ?')){
    userScores={};matchScen={};saveScores();saveMatchScen();renderAll();
  }
}
